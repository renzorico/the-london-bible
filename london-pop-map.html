  function buildCorrelationPanelContent() {
    const points = correlationScatterData();
    const focusFeature = correlationFocusFeature();
    const focusName = focusFeature?.properties?.[NAME_FIELD] || null;
    const xMetric = correlationMetricConfig(correlationXMetric);
    const yMetric = correlationMetricConfig(correlationYMetric);

    if (!points.length) {
      return `
        <div class="corr-helper">No reliable borough values are available for the selected metric pair.</div>
        <div class="corr-foot">Choose a different pair of borough metrics to continue.</div>
      `;
    }

    const width = 560;
    const height = 286;
    const margin = { top: 12, right: 18, bottom: 42, left: 54 };
    const plotWidth = width - margin.left - margin.right;
    const plotHeight = height - margin.top - margin.bottom;
    const xs = points.map((point) => point.x);
    const ys = points.map((point) => point.y);
    const xMin = Math.min(...xs);
    const xMax = Math.max(...xs);
    const yMin = Math.min(...ys);
    const yMax = Math.max(...ys);
    const xPad = xMax > xMin ? (xMax - xMin) * 0.08 : 1;
    const yPad = yMax > yMin ? (yMax - yMin) * 0.08 : 1;
    const xDomain = [xMin - xPad, xMax + xPad];
    const yDomain = [yMin - yPad, yMax + yPad];
    const xScale = (value) => margin.left + ((value - xDomain[0]) / (xDomain[1] - xDomain[0] || 1)) * plotWidth;
    const yScale = (value) => height - margin.bottom - ((value - yDomain[0]) / (yDomain[1] - yDomain[0] || 1)) * plotHeight;
    const xMid = margin.left + plotWidth / 2;
    const yMid = margin.top + plotHeight / 2;

    const pointMarkup = points.map((point) => {
      const hovered = focusName && point.name === focusName;
      const pinned = correlationPinnedFeature()?.properties?.[NAME_FIELD] === point.name;
      const classes = ["corr-point"];
      if (hovered) classes.push("hovered");
      if (pinned) classes.push("pinned");
      return `<circle class="${classes.join(" ")}" data-borough="${point.name}" cx="${xScale(point.x).toFixed(2)}" cy="${yScale(point.y).toFixed(2)}" r="${pinned ? 5.6 : hovered ? 5.1 : 3.9}" />`;
    }).join("");

    const detailKicker = correlationPinnedFeature()
      ? "Selected borough"
      : (correlationHoverName ? "Hovered borough" : "Pinned borough");
    const detailHtml = focusFeature
      ? `
        <div class="corr-detail">
          <div class="corr-detail-kicker">${detailKicker}</div>
          <div class="corr-detail-name">${focusFeature.properties?.[NAME_FIELD] ?? "Selected borough"}</div>
          <div class="corr-detail-values">
            <div class="corr-detail-row"><span>${correlationAxisLabel(correlationXMetric)}</span><span>${formatMetricValueFor(correlationXMetric, correlationMetricValue(focusFeature, correlationXMetric), correlationXMetric === "country_of_birth_pct" ? "ALL" : selectedCountryBirth)}</span></div>
            <div class="corr-detail-row"><span>${correlationAxisLabel(correlationYMetric)}</span><span>${formatMetricValueFor(correlationYMetric, correlationMetricValue(focusFeature, correlationYMetric), correlationYMetric === "country_of_birth_pct" ? "ALL" : selectedCountryBirth)}</span></div>
          </div>
        </div>
      `
      : `
        <div class="corr-detail">
          <div class="corr-helper">Hover a borough or point to inspect it, or pin a borough on the map to keep it selected here.</div>
        </div>
      `;

    return `
      <div class="corr-selectors">
        <div class="corr-select-group">
          <div class="corr-label">X metric</div>
          <select id="corr-x-select" class="corr-select">
            ${correlationMetricOptionsHtml(correlationXMetric)}
          </select>
        </div>
        <div class="corr-select-group">
          <div class="corr-label">Y metric</div>
          <select id="corr-y-select" class="corr-select">
            ${correlationMetricOptionsHtml(correlationYMetric)}
          </select>
        </div>
      </div>
      <div class="corr-chart-wrap">
        <svg class="corr-svg" viewBox="0 0 ${width} ${height}" role="img" aria-label="Scatterplot of ${xMetric.label} against ${yMetric.label}">
          <rect x="${margin.left}" y="${margin.top}" width="${plotWidth}" height="${plotHeight}" rx="10" fill="${currentTheme === "night" ? "rgba(255,255,255,0.03)" : "rgba(255,255,255,0.52)"}" />
          <line class="corr-gridline" x1="${margin.left}" y1="${yMid}" x2="${width - margin.right}" y2="${yMid}" />
          <line class="corr-gridline" x1="${xMid}" y1="${margin.top}" x2="${xMid}" y2="${height - margin.bottom}" />
          <line class="corr-axis" x1="${margin.left}" y1="${height - margin.bottom}" x2="${width - margin.right}" y2="${height - margin.bottom}" />
          <line class="corr-axis" x1="${margin.left}" y1="${margin.top}" x2="${margin.left}" y2="${height - margin.bottom}" />
          ${pointMarkup}
          <text class="corr-axis-label" x="${margin.left}" y="${height - 8}">${correlationAxisLabel(correlationXMetric)}</text>
          <text class="corr-axis-label" transform="translate(12 ${height - margin.bottom}) rotate(-90)">${correlationAxisLabel(correlationYMetric)}</text>
        </svg>
      </div>
      ${detailHtml}
      <div class="corr-foot">Each point is a borough. Hover links the map and scatter, and pinned boroughs stay highlighted in both views.</div>
    `;
  }

  function buildStoryPanelContent() {
    const chapter = activeChapter();
    const picker = `
      <div class="story-picker">
        ${STORY_CHAPTERS.map((story) => `
          <button class="toggle-btn metric-btn chapter-btn${activeChapterId === story.id ? " active" : ""}" onclick="applyChapter('${story.id}')">${story.title}</button>
        `).join("")}
      </div>
    `;

    if (!chapter) {
      return `
        ${picker}
        <div class="analysis-empty">Choose a city-wide chapter to jump into a preset London view and reading prompt. Stories do not require selecting a borough first.</div>
      `;
    }

    const metricConfig = getMetricConfigFor(chapter.state.metric, chapter.state.countrySelection ?? selectedCountryBirth);
    const geographyLabel = chapter.state.geography === "msoa" ? "MSOA" : "Borough";
    const yearLabel = chapter.state.year ? ` · ${chapter.state.year}` : "";
    return `
      ${picker}
      <div class="story-head">
        <div class="analysis-empty">Stories frame city-wide London patterns. They set a starting lens and camera, then leave normal exploration intact.</div>
        <button class="ch-clear" onclick="clearChapter()">Clear</button>
      </div>
      <div class="ch-name">${chapter.title}</div>
      <div class="ch-meta">${metricConfig.label} · ${geographyLabel}${yearLabel}</div>
      <div class="ch-description">${chapter.description}</div>
      <div class="ch-foot">This chapter is a whole-city preset, not a borough-specific reading. You can still pan, zoom, and inspect any borough normally.</div>
    `;
  }

  function analysisPanelMeta() {
    switch (analysisMode) {
      case "compare":
        return { title: "Compare boroughs", subtitle: "Side-by-side view of the current active borough metric." };
      case "why-here":
        return { title: "Why here?", subtitle: "Narrative profile built from the borough metric set." };
      case "similar":
        return { title: "Similar areas", subtitle: "Nearest borough matches across the wider profile, not just the current lens." };
      case "correlation":
        return { title: "Correlation view", subtitle: "Choose any two borough metrics and inspect the relationship as a linked scatter." };
      case "story":
        return { title: "Stories", subtitle: "City-wide preset chapters that frame major London patterns without requiring a borough selection." };
      default:
        return { title: "Analysis", subtitle: "Choose an analysis tool to explore this borough in more detail." };
    }
  }

  function mountCorrelationInteractions() {
    const xSelect = analysisPanelContentEl.querySelector("#corr-x-select");
    const ySelect = analysisPanelContentEl.querySelector("#corr-y-select");
    if (xSelect) xSelect.onchange = (event) => setCorrelationAxis("x", event.target.value);
    if (ySelect) ySelect.onchange = (event) => setCorrelationAxis("y", event.target.value);
    analysisPanelContentEl.querySelectorAll(".corr-point").forEach((pointEl) => {
      pointEl.addEventListener("mouseenter", () => setCorrelationHover(pointEl.dataset.borough));
      pointEl.addEventListener("mouseleave", () => setCorrelationHover(null));
    });
  }

  function renderAnalysisPanel() {
    normalizeAnalysisModeForState();
    const visible = !!analysisMode;
    analysisPanelEl.style.display = visible ? "flex" : "none";
    if (!visible) {
      analysisPanelContentEl.innerHTML = "";
      return;
    }

    const meta = analysisPanelMeta();
    analysisPanelTitleEl.textContent = meta.title;
    analysisPanelSubtitleEl.textContent = meta.subtitle;
    analysisPanelSubtitleEl.style.display = meta.subtitle ? "" : "none";

    let html = `<div class="analysis-empty">Choose an analysis tool to explore this borough in more detail.</div>`;
    if (analysisMode === "compare") html = buildComparisonPanelContent();
    if (analysisMode === "why-here") html = buildSpotlightPanelContent();
    if (analysisMode === "similar") html = buildSimilarPanelContent();
    if (analysisMode === "correlation") html = buildCorrelationPanelContent();
    if (analysisMode === "story") html = buildStoryPanelContent();
    analysisPanelContentEl.innerHTML = html;

    if (analysisMode === "correlation") mountCorrelationInteractions();
  }

  function updateStopHoverBehavior() {
    return onlyTubeMode();
  }

  function updateBoroughStyling() {
    rebuildMainLayer();
  }

  function updateLegend() {
    renderLegend();
    renderTubeLegend();
    renderAnalysisPanel();
  }

  function refreshMapState(nextViewState = null) {
    normalizeAnalysisModeForState();
    if (currentDataset === "municipi") {
      ACTIVE_FEATURES = activeAnalysisFeatures();
    } else if (currentDataset === "sections") {
      ACTIVE_FEATURES = sectionsGeoJSON.features;
    } else {
      ACTIVE_FEATURES = [];
    }
    updateBoroughStyling();
    const props = { layers: getLayers() };
    if (nextViewState) props.initialViewState = nextViewState;
    deckgl.setProps(props);
    updateModeButtons();
    updateControlVisibility();
    updateMetricButtons();
    updatePubsScopeButtons();
    updateGeographyButtons();
    updateYearControl();
    updateCountrySelector();
    updateChapterSelector();
    updateLegend();
    refreshHighlightedFeature();
    renderPinnedTooltip();
  }

  function applyActiveMetric(metricKey) {
    boroughMetric = metricKey;
    refreshMapState();
  }

  function clearPinnedTooltip() {
    tooltipPinned = false;
    pinnedCoord = null;
    tooltipEl.classList.remove("summary-card");
    tooltipEl.classList.remove("pinned");
    tooltipEl.style.display = "none";
    syncPinnedSelectionState();
  }

  function handleComparisonSelection(feature) {
    const boroughName = feature?.properties?.[NAME_FIELD];
    if (!boroughName) return;

    if (comparisonA === boroughName) comparisonA = null;
    else if (comparisonB === boroughName) comparisonB = null;
    else if (!comparisonA) comparisonA = boroughName;
    else if (!comparisonB) comparisonB = boroughName;
    else comparisonB = boroughName;

    normalizeComparisonSelections();
    clearPinnedTooltip();
    refreshMapState();
  }

  const deckgl = new deck.DeckGL({
    container: "map",
    mapStyle: THEMES[currentTheme].mapStyle,
    initialViewState: viewState,
    controller: { scrollZoom: { smooth: true, speed: 0.02 }, inertia: 0, doubleClickZoom: false },
    layers: [],
    onViewStateChange: ({ viewState: vs, oldViewState }) => {
      if (oldViewState) {
        const delta = vs.zoom - oldViewState.zoom;
        if (Math.abs(delta) > 0.4) vs = { ...vs, zoom: oldViewState.zoom + Math.sign(delta) * 0.4 };
      }
      viewState = vs;
      updatePinnedPosition(vs);
    },

    onHover: ({ object, coordinate, x, y }) => {
      if (isAnalysisMode("correlation") && correlationAvailable()) {
        const hoveredName = currentDataset === "municipi" && object?.properties?.[NAME_FIELD]
          ? object.properties[NAME_FIELD]
          : null;
        if (correlationHoverName !== hoveredName) {
          correlationHoverName = hoveredName;
          deckgl.setProps({ layers: getLayers() });
          renderAnalysisPanel();
        }
      }
      if (tooltipPinned) return;
      if (!object) { tooltipEl.style.display = "none"; return; }
      tooltipEl.classList.remove("pinned");

      if (object.layer?.id === "stations") {
        tooltipEl.innerHTML = stationTooltipHtml(object, false);
        tooltipEl.style.display = "block";
        positionTooltip(x, y);
        return;
      }
      if (object.layer?.id === "tube-lines") {
        tooltipEl.innerHTML = lineTooltipHtml(object, false);
        tooltipEl.style.display = "block";
        positionTooltip(x, y);
        return;
      }

      if (onlyTubeMode()) {
        tooltipEl.style.display = "none";
        return;
      }

      if (currentDataset === "municipi") {
        tooltipEl.innerHTML = boroughMetricTooltipHtml(object, false);
        tooltipEl.style.display = "block";
        positionTooltip(x, y);
        return;
      }

      const zone = zoneLabel(object, coordinate);
      const pop = object.properties?.[POP_FIELD] ?? 0;
      const dens = object.properties?.density ?? 0;
      tooltipEl.innerHTML = densityTooltipHtml(zone, pop, dens, false);
      tooltipEl.style.display = "block";
      positionTooltip(x, y);
    },

    onClick: ({ object, coordinate, x, y }) => {
      if (!coordinate) return;
      if (onlyTubeMode() && !object) {
        selectedTubeLineKey = null;
        clearTubeInteractionState();
        deckgl.setProps({ layers: getLayers() });
        renderTubeLegend();
        return;
      }

      if (onlyTubeMode() && object?.layer?.id === "tube-lines") {
        const lineKey = object.properties?.lineKey || null;
        setSelectedTubeLine(lineKey);
        tooltipEl.innerHTML = lineTooltipHtml(object, false);
        tooltipEl.style.display = "block";
        positionTooltip(x, y);
        return;
      }

      if (currentDataset === "municipi" && isAnalysisMode("compare") && comparisonAvailable() && object?.properties?.[NAME_FIELD]) {
        handleComparisonSelection(object);
        return;
      }

      tooltipPinned = true;
      pinnedCoord = coordinate;
      tooltipEl.classList.add("pinned");

      if (object?.layer?.id === "stations") {
        tooltipEl.classList.remove("summary-card");
        tooltipEl.innerHTML = stationTooltipHtml(object, true);
        tooltipEl.style.display = "block";
        positionTooltip(x, y);
        renderAnalysisPanel();
        return;
      }
      if (object?.layer?.id === "tube-lines") {
        const lineKey = object.properties?.lineKey || null;
        setSelectedTubeLine(lineKey, { preserveTooltip: true });
        tooltipEl.classList.remove("summary-card");
        tooltipEl.innerHTML = lineTooltipHtml(object, true);
        tooltipEl.style.display = "block";
        positionTooltip(x, y);
        renderAnalysisPanel();
        return;
      }

      if (onlyTubeMode()) {
        clearTubeInteractionState();
        return;
      }

      if (currentDataset === "municipi" && object) {
        highlightedFeature = object;
        tooltipEl.classList.add("summary-card");
        tooltipEl.innerHTML = boroughMetricTooltipHtml(object, true);
        tooltipEl.style.display = "block";
        positionPinnedSummaryCard();
        syncPinnedSelectionState(object);
        return;
      }

      tooltipEl.classList.remove("summary-card");
      const pop = object?.properties?.[POP_FIELD] ?? statsAt(...coordinate).population;
      const dens = object?.properties?.density ?? statsAt(...coordinate).density;
      const zone = zoneLabel(object, coordinate);
      tooltipEl.innerHTML = densityTooltipHtml(zone, pop, dens, true);
      tooltipEl.style.display = "block";
      positionTooltip(x, y);
      syncPinnedSelectionState();
    },
  });

  refreshMapState();

  function restoreAfterStyleChange() {
    refreshMapState({ ...viewState, transitionDuration: 0 });
    applyBasemapThemeStyles();
  }

  function getBaseMap() {
    return deckgl.getMapboxMap?.() || deckgl.map || deckgl._map || null;
  }

  function bindLoadingOverlayToReadiness() {
    const map = getBaseMap();
    if (!map) {
      markAtlasReady();
      return;
    }

    let settled = false;
    const finish = () => {
      if (settled) return;
      settled = true;
      clearTimeout(fallbackTimer);
      statusEl.textContent = "Opening atlas…";
      markAtlasReady();
    };
    const fallbackTimer = setTimeout(finish, 2400);

    if (map.loaded?.() && map.isStyleLoaded?.()) {
      finish();
      return;
    }

    map.once?.("idle", finish);
    map.once?.("error", finish);
  }

  function applyBasemapThemeStyles() {
    const map = getBaseMap();
    if (!map) return;

    const tuneStyle = () => {
      const layers = map.getStyle?.().layers || [];
      for (const layer of layers) {
        try {
          const id = layer.id.toLowerCase();
          if (layer.type === "background") {
            map.setPaintProperty(layer.id, "background-color", currentTheme === "night" ? "#0b1217" : "#f3f4f5");
          }
          if (layer.type === "fill") {
            if (id.includes("water")) {
              map.setPaintProperty(layer.id, "fill-color", currentTheme === "night" ? "#19232c" : "#dce3e7");
              map.setPaintProperty(layer.id, "fill-opacity", currentTheme === "night" ? 0.78 : 0.62);
            } else if (id.includes("landuse") || id.includes("landcover") || id.includes("park") || id.includes("building")) {
              map.setPaintProperty(layer.id, "fill-color", currentTheme === "night" ? "#121920" : "#f5f5f4");
              map.setPaintProperty(layer.id, "fill-opacity", currentTheme === "night" ? 0.28 : 0.35);
            }
          }
          if (layer.type === "line" && (id.includes("road") || id.includes("street") || id.includes("highway"))) {
            map.setPaintProperty(layer.id, "line-color", currentTheme === "night" ? "#2b3540" : "#d5dade");
            map.setPaintProperty(layer.id, "line-opacity", currentTheme === "night" ? 0.34 : 0.42);
          }
          if (layer.type === "symbol" && id.includes("label")) {
            map.setPaintProperty(layer.id, "text-color", currentTheme === "night" ? "#8b98a6" : "#91979e");
            map.setPaintProperty(layer.id, "text-halo-color", currentTheme === "night" ? "#0d1319" : "#f7f7f6");
            map.setPaintProperty(layer.id, "text-halo-width", currentTheme === "night" ? 0.35 : 0.55);
            if (id.includes("transit") || id.includes("rail") || id.includes("station")) {
              map.setLayoutProperty(layer.id, "text-radial-offset", 0.12);
            }
          }
        } catch (err) {}
      }
    };

    if (map.isStyleLoaded?.()) tuneStyle();
    map.once?.("styledata", tuneStyle);
  }

  function applyTheme(theme) {
    currentTheme = theme;
    bodyEl.dataset.theme = theme === "night" ? "night" : "";
    btnTheme.textContent = THEMES[theme].themeLabel;
    deckgl.setProps({
      mapStyle: THEMES[theme].mapStyle,
      layers: getLayers(),
      initialViewState: { ...viewState, transitionDuration: 0 },
    });
    updateMetricButtons();
    updateCountrySelector();
    updateLegend();
    requestAnimationFrame(() => restoreAfterStyleChange());
  }

  setMode = function(mode) {
    selectedTubeLineKey = null;
    if (mode === "sections") {
      currentDataset = "sections";
      ACTIVE_FEATURES = sectionsGeoJSON.features;
    } else if (mode === "municipi") {
      if (!municipiGeoJSON) return;
      currentDataset = "municipi";
      ACTIVE_FEATURES = municipiGeoJSON.features;
    } else {
      currentDataset = "tube";
      ACTIVE_FEATURES = [];
    }
    refreshMapState();
  };

  setMetric = function(metricKey) {
    if (!METRICS[metricKey] || !metricAvailableInCurrentView(metricKey)) return;
    if (metricKey === "pubs_per_km2_msoa") activeGeography = "msoa";
    else if (metricKey !== "density") activeGeography = "borough";
    if (metricKey === "country_of_birth_pct" && analysisMode === "compare") selectedCountryBirth = "ALL";
    applyActiveMetric(metricKey);
  };

  setMetricFamily = function(familyKey) {
    if (familyKey === "pubs") {
      setMetric(pubsScope() === "msoa" && metricAvailableInCurrentView("pubs_per_km2_msoa") ? "pubs_per_km2_msoa" : "pubs_per_km2");
      return;
    }
  };

  setPubsScope = function(scope) {
    if (scope === "msoa") {
      if (!metricAvailableInCurrentView("pubs_per_km2_msoa")) return;
      setMetric("pubs_per_km2_msoa");
      return;
    }
    if (!metricAvailableInCurrentView("pubs_per_km2")) return;
    setMetric("pubs_per_km2");
  };

  setCountryMetric = function(country) {
    if (!COUNTRY_BIRTH_SHORTLIST.includes(country)) return;
    selectedCountryBirth = country;
    if (boroughMetric === "country_of_birth_pct" && currentDataset === "municipi") {
      refreshMapState();
    } else {
      updateCountrySelector();
    }
  };

  setGeography = function(geography) {
    if (!geographyAvailableInCurrentView(geography)) return;
    activeGeography = geography;
    activeYear = resolvedActiveYear();
    refreshMapState();
  };

  setYear = function(year) {
    const resolvedYear = Number(year);
    if (!getAvailableYearsForState().includes(resolvedYear)) return;
    activeYear = resolvedYear;
    if (currentDataset === "municipi" && boroughMetric === "density" && activeGeography === "msoa") {
      refreshMapState();
    } else {
      updateYearControl();
    }
  };

  setYearFromIndex = function(index) {
    const years = getAvailableYearsForState();
    if (!years.length) return;
    const resolvedIndex = Math.max(0, Math.min(years.length - 1, Number(index)));
    setYear(years[resolvedIndex]);
  };

  toggleComparison = function() {
    if (currentDataset !== "municipi") return;
    setAnalysisMode("compare");
    refreshMapState();
  };

  clearComparison = function() {
    if (analysisMode === "compare") analysisMode = null;
    clearComparisonSelectionState();
    refreshMapState();
  };

  toggleSpotlight = function() {
    setAnalysisMode("why-here");
    refreshMapState();
  };

  toggleSimilar = function() {
    setAnalysisMode("similar");
    refreshMapState();
  };

  toggleCorrelation = function() {
    setAnalysisMode("correlation");
    refreshMapState();
  };

  setCorrelationAxis = function(axis, metricKey) {
    if (!CORRELATION_METRICS.includes(metricKey)) return;
    if (axis === "x") correlationXMetric = metricKey;
    if (axis === "y") correlationYMetric = metricKey;
    renderAnalysisPanel();
  };

  toggleChapterPicker = function() {
    setAnalysisMode("story");
    refreshMapState();
  };

  applyChapter = function(chapterId) {
    const chapter = STORY_CHAPTERS.find((entry) => entry.id === chapterId);
    if (!chapter) return;

    currentDataset = chapter.state.view || "municipi";
    boroughMetric = chapter.state.metric;
    activeGeography = chapter.state.geography || "borough";
    if (chapter.state.countrySelection) selectedCountryBirth = chapter.state.countrySelection;
    if (chapter.state.year != null) activeYear = chapter.state.year;
    else activeYear = resolvedActiveYear();

    showStations = false;
    is3D = false;
    clearComparisonSelectionState();
    correlationHoverName = null;
    analysisMode = "story";
    activeChapterId = chapter.id;
    highlightedFeature = null;
    pinData = [];
    clearPinnedTooltip();

    refreshMapState(chapter.camera ? { ...viewState, ...chapter.camera, transitionDuration: 700 } : undefined);
  };

  clearChapter = function() {
    if (analysisMode === "story") analysisMode = null;
    activeChapterId = null;
    refreshMapState();
  };

  clearAnalysisMode = function() {
    if (!analysisMode) return;
    clearAnalysisModeState(analysisMode);
    analysisMode = null;
    refreshMapState();
  };

  setView = function(mode) {
    is3D = mode === "3d";
    refreshMapState({
      ...viewState,
      pitch: is3D ? 50 : 0,
      bearing: is3D ? (viewState.bearing || -15) : 0,
      transitionDuration: 500,
    });
    document.getElementById("btn-3d").classList.toggle("active", is3D);
    document.getElementById("btn-flat").classList.toggle("active", !is3D);
  };

  toggleStations = function() {
    if (currentDataset !== "municipi") return;
    showStations = !showStations;
    if (!showStations) selectedTubeLineKey = null;
    refreshMapState();
  };

  toggleTheme = function() {
    applyTheme(currentTheme === "day" ? "night" : "day");
  };

  resetView = function() {
    selectedTubeLineKey = null;
    highlightedFeature = null;
    pinData = [];
    tooltipPinned = false;
    pinnedCoord = null;
    tooltipEl.classList.remove("pinned");
    tooltipEl.style.display = "none";
    refreshMapState({
      longitude: -0.118, latitude: 51.505, zoom: 10.5,
      pitch: is3D ? 50 : 0, bearing: is3D ? -15 : 0,
      transitionDuration: 700,
    });
  };

  async function search() {
    const input = document.getElementById("search-input");
    const q = input.value.trim();
    if (!q) return;

    const geo = await forwardGeocode(q);
    if (!geo) {
      input.style.borderColor = "rgba(188,48,80,.8)";
      const prev = input.placeholder;
      input.placeholder = "Address not found";
      input.value = "";
      setTimeout(() => { input.style.borderColor = ""; input.placeholder = prev; }, 2000);
      return;
    }
    highlightedFeature = featureAt(geo.lon, geo.lat);
    pinData = [geo];
    is3D = false;
    tooltipPinned = false;
    tooltipEl.style.display = "none";
    document.getElementById("btn-3d").classList.remove("active");
    document.getElementById("btn-flat").classList.add("active");
    refreshMapState({
      longitude: geo.lon, latitude: geo.lat,
      zoom: 14, pitch: 0, bearing: 0, transitionDuration: 800,
    });
  }

  document.getElementById("search-btn").onclick = search;
  document.getElementById("search-input").onkeydown = (e) => { if (e.key === "Enter") search(); };

  applyTheme("day");
  refreshMapState();
  bindLoadingOverlayToReadiness();
}

init();
</script>
</body>
</html>
