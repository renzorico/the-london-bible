<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The London Bible</title>

<link href="https://cdn.jsdelivr.net/npm/maplibre-gl@4.5.2/dist/maplibre-gl.css" rel="stylesheet" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/maplibre-gl@4.5.2/dist/maplibre-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/deck.gl@9.0.27/dist.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>

<style>
  :root {
    --font-display: "Manrope", system-ui, sans-serif;
    --font-ui: "Public Sans", system-ui, sans-serif;

    --bg: #f4efe8;
    --panel: rgba(249, 245, 239, 0.92);
    --panel-strong: rgba(255, 251, 247, 0.97);
    --panel-border: rgba(115, 76, 64, 0.16);
    --panel-shadow: 0 14px 34px rgba(79, 49, 38, 0.08);
    --title: #17212b;
    --subtitle: #7b6c61;
    --button-text: #3f332c;
    --button-bg: rgba(255, 252, 249, 0.86);
    --button-border: rgba(93, 65, 56, 0.18);
    --button-hover: rgba(255, 255, 255, 0.98);
    --button-active: #0b5c63;
    --button-active-border: #0b5c63;
    --button-active-text: #ffffff;
    --tooltip-bg: rgba(254, 251, 247, 0.98);
    --tooltip-border: rgba(93, 65, 56, 0.18);
    --tooltip-text: #2a241f;
    --tooltip-subtle: #7b6c61;
    --legend-text: #8a786c;
    --legend-accent: #6a2038;
    --hint: #b3a396;
    --attrib-bg: rgba(249, 245, 239, 0.82);
    --attrib-text: #a48f82;
    --search-focus: rgba(11, 92, 99, 0.45);
    --thames: 30, 120, 200, 220;
    --highlight-fill: 30, 120, 200, 70;
    --highlight-line: 30, 120, 200, 255;
    --pin-fill: 30, 120, 200, 255;
  }

  body[data-theme="night"] {
    --bg: #0b1217;
    --panel: rgba(16, 22, 30, 0.82);
    --panel-strong: rgba(20, 27, 36, 0.92);
    --panel-border: rgba(163, 184, 204, 0.14);
    --panel-shadow: 0 18px 46px rgba(0, 0, 0, 0.28);
    --title: #eef2f6;
    --subtitle: #91a0af;
    --button-text: #dbe5ef;
    --button-bg: rgba(15, 22, 30, 0.82);
    --button-border: rgba(150, 170, 190, 0.16);
    --button-hover: rgba(24, 33, 44, 0.96);
    --button-active: #4f8589;
    --button-active-border: #4f8589;
    --button-active-text: #ffffff;
    --tooltip-bg: rgba(17, 24, 32, 0.96);
    --tooltip-border: rgba(163, 184, 204, 0.14);
    --tooltip-text: #edf2f7;
    --tooltip-subtle: #9fb0c0;
    --legend-text: #a7b7c6;
    --legend-accent: #f0c572;
    --hint: #788796;
    --attrib-bg: rgba(16, 22, 30, 0.84);
    --attrib-text: #93a1af;
    --search-focus: rgba(79, 133, 137, 0.45);
    --thames: 90, 164, 255, 230;
    --highlight-fill: 79, 133, 137, 70;
    --highlight-line: 147, 212, 205, 255;
    --pin-fill: 255, 199, 107, 255;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); font-family: var(--font-ui); overflow: hidden; color: var(--title); }
  #map { width: 100vw; height: 100vh; }

  .maplibregl-ctrl-attrib {
    background: var(--attrib-bg) !important;
    font-size: .56rem !important; color: var(--attrib-text) !important;
    font-family: var(--font-ui) !important;
  }
  .maplibregl-ctrl-attrib-button { display: none !important; }

  #left-stack {
    position: absolute;
    top: 20px;
    left: 24px;
    z-index: 12;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
    width: min(388px, calc(100vw - 48px));
    max-width: min(388px, calc(100vw - 48px));
  }
  .control-group {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 10px;
    width: 100%;
  }
  .rail-card {
    position: relative;
    z-index: 10;
    width: 100%;
    padding: 14px 15px 14px;
    border: 1px solid var(--panel-border);
    background: linear-gradient(180deg, var(--panel-strong), var(--panel));
    box-shadow: var(--panel-shadow);
    backdrop-filter: blur(16px);
    border-radius: 16px;
  }
  .rail-card-head {
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  #title {
    pointer-events: none;
    padding: 16px 17px 13px;
  }
  #title h1 {
    font-family: var(--font-display);
    font-size: 2.02rem;
    line-height: 1;
    font-weight: 800;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--title);
    white-space: nowrap;
  }
  #title p  {
    margin-top: 5px;
    font-family: var(--font-ui);
    font-size: .68rem;
    font-weight: 500;
    letter-spacing: .12em;
    color: var(--subtitle);
    text-align: right;
    font-style: italic;
  }

  #layer-toggle, #view-toggle, #metric-toggle {
    width: 100%;
  }
  #layer-toggle {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    align-items: stretch;
  }
  #layer-toggle .toggle-btn,
  #view-toggle .toggle-btn {
    width: 100%;
    min-width: 0;
    justify-content: center;
    padding: 6px 10px 5px;
    font-size: .6rem;
    letter-spacing: .14em;
    min-height: 35px;
    text-align: center;
  }
  #metric-toggle {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 7px;
    align-items: stretch;
    max-width: none;
    position: relative;
    z-index: 2;
  }
  #metric-options {
    display: none;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    margin-top: 8px;
    padding: 11px 12px 12px;
    border: 1px solid color-mix(in srgb, var(--panel-border) 88%, transparent);
    background: color-mix(in srgb, var(--panel-strong) 78%, transparent);
    border-radius: 12px;
    position: relative;
    z-index: 1;
    pointer-events: none;
  }
  #metric-group { position: relative; isolation: isolate; }
  .metric-option-row {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
    pointer-events: auto;
  }
  .metric-option-row.active-scope {
    padding: 10px 11px 11px;
    border: 1px solid color-mix(in srgb, var(--button-active) 26%, var(--panel-border) 74%);
    background: color-mix(in srgb, var(--button-active) 8%, var(--panel-strong) 92%);
    border-radius: 11px;
  }
  .metric-option-row + .metric-option-row {
    padding-top: 8px;
    border-top: 1px solid color-mix(in srgb, var(--panel-border) 76%, transparent);
  }
  .metric-option-row.active-scope + .metric-option-row {
    padding-top: 0;
    border-top: none;
  }
  .metric-option-row[hidden] { display: none !important; }
  .metric-option-label {
    font-family: var(--font-ui);
    font-size: .55rem;
    font-weight: 800;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: color-mix(in srgb, var(--title) 74%, var(--subtitle) 26%);
  }
  .metric-option-row.active-scope .metric-option-label {
    color: color-mix(in srgb, var(--button-active) 68%, var(--title) 32%);
  }
  #year-row .metric-option-label {
    margin-bottom: 4px;
    display: block;
    padding-top: 5px;
    line-height: 1.2;
  }
  .metric-subtoggle {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    width: 100%;
  }
  #country-toggle {
    flex-wrap: nowrap;
    justify-content: space-between;
    gap: 5px;
  }
  .metric-subtoggle.tight { gap: 5px; }
  .time-control {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    min-width: 0;
  }
  .time-slider-wrap {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
  }
  .time-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 5px;
    border-radius: 999px;
    outline: none;
    background: linear-gradient(90deg, color-mix(in srgb, var(--subtitle) 35%, transparent), color-mix(in srgb, var(--title) 42%, transparent));
  }
  .time-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--title);
    border: 2px solid color-mix(in srgb, var(--panel) 72%, transparent);
    box-shadow: 0 1px 8px rgba(0,0,0,.18);
    cursor: pointer;
  }
  .time-slider::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--title);
    border: 2px solid color-mix(in srgb, var(--panel) 72%, transparent);
    box-shadow: 0 1px 8px rgba(0,0,0,.18);
    cursor: pointer;
  }
  .time-slider::-moz-range-track {
    height: 5px;
    border-radius: 999px;
    background: linear-gradient(90deg, color-mix(in srgb, var(--subtitle) 35%, transparent), color-mix(in srgb, var(--title) 42%, transparent));
  }
  .time-stops {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    font-family: var(--font-ui);
    font-size: .64rem;
    font-weight: 700;
    letter-spacing: .09em;
    text-transform: uppercase;
    color: var(--subtitle);
  }
  .time-stop {
    color: var(--subtitle);
    opacity: .72;
    transition: color .18s ease, opacity .18s ease;
  }
  .time-stop.active {
    color: var(--title);
    opacity: 1;
  }
  #top-right-controls {
    position: absolute;
    top: 20px;
    right: 24px;
    z-index: 20;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 12px;
  }
  #theme-toggle {
    position: relative;
    top: auto;
    right: auto;
    z-index: 20;
    flex: 0 0 auto;
  }
  .control-title {
    font-family: var(--font-ui);
    font-size: .56rem;
    font-weight: 800;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: color-mix(in srgb, var(--title) 68%, var(--subtitle) 32%);
  }
  .toggle-btn {
    padding: 7px 12px 6px;
    font-family: var(--font-ui);
    font-size: .68rem;
    font-weight: 700;
    letter-spacing: .18em;
    text-transform: uppercase;
    background: var(--button-bg);
    border: 1px solid var(--button-border);
    border-radius: 10px;
    color: var(--button-text);
    cursor: pointer; transition: all .15s;
    backdrop-filter: blur(14px);
    box-shadow: var(--panel-shadow);
  }
  .toggle-btn:hover:not(:disabled) { background: var(--button-hover); border-color: rgba(83, 66, 58, .34); transform: translateY(-1px); }
  .toggle-btn.active { background: var(--button-active); color: var(--button-active-text); border-color: var(--button-active-border); }
  .toggle-btn:disabled { opacity: .4; cursor: default; }
  .toggle-btn.metric-btn {
    padding: 6px 10px 5px;
    font-size: .6rem;
    font-weight: 700;
    letter-spacing: .14em;
    justify-content: flex-start;
    min-height: 35px;
    text-align: left;
  }
  .toggle-btn.icon-btn {
    position: relative;
    justify-content: center;
    align-items: center;
    padding: 0;
    min-height: 42px;
    aspect-ratio: 1;
    border-radius: 12px;
    text-align: center;
    overflow: visible;
  }
  .toggle-btn.icon-btn::after {
    content: attr(data-label);
    position: absolute;
    left: 50%;
    bottom: calc(100% + 8px);
    transform: translateX(-50%) translateY(4px);
    opacity: 0;
    pointer-events: none;
    white-space: nowrap;
    padding: 6px 8px 5px;
    border-radius: 8px;
    border: 1px solid color-mix(in srgb, var(--panel-border) 90%, transparent);
    background: color-mix(in srgb, var(--panel) 94%, transparent);
    color: var(--tooltip-text);
    font-family: var(--font-ui);
    font-size: .56rem;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    box-shadow: var(--panel-shadow);
    transition: opacity .14s ease, transform .14s ease;
    z-index: 30;
  }
  .toggle-btn.icon-btn:hover::after,
  .toggle-btn.icon-btn:focus-visible::after {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .icon-glyph {
    display: inline-flex;
    width: 18px;
    height: 18px;
    align-items: center;
    justify-content: center;
    color: color-mix(in srgb, var(--title) 88%, var(--subtitle) 12%);
  }
  .icon-glyph svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.7;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .toggle-btn.icon-btn.active .icon-glyph {
    color: var(--button-active-text);
  }
  .toggle-btn.flag-btn {
    min-height: 38px;
    flex: 1 1 0;
  }
  .flag-swatch {
    display: inline-flex;
    width: 18px;
    height: 13px;
    border-radius: 4px;
    border: 1px solid rgba(0,0,0,.14);
    box-shadow: inset 0 0 0 0.5px rgba(255,255,255,.25);
    overflow: hidden;
  }
  .flag-overview {
    background:
      linear-gradient(90deg, transparent 38%, rgba(255,255,255,.92) 38%, rgba(255,255,255,.92) 62%, transparent 62%),
      linear-gradient(transparent 34%, rgba(255,255,255,.92) 34%, rgba(255,255,255,.92) 66%, transparent 66%),
      linear-gradient(90deg, transparent 45%, #cf3f4e 45%, #cf3f4e 55%, transparent 55%),
      linear-gradient(transparent 42%, #cf3f4e 42%, #cf3f4e 58%, transparent 58%),
      linear-gradient(145deg, transparent 44%, rgba(255,255,255,.85) 44%, rgba(255,255,255,.85) 52%, transparent 52%),
      linear-gradient(35deg, transparent 48%, rgba(255,255,255,.85) 48%, rgba(255,255,255,.85) 56%, transparent 56%),
      linear-gradient(145deg, transparent 47%, #cf3f4e 47%, #cf3f4e 50%, transparent 50%),
      linear-gradient(35deg, transparent 50%, #cf3f4e 50%, #cf3f4e 53%, transparent 53%),
      #1f4e8f;
  }
  .flag-india { background: linear-gradient(180deg, #f09332 0 33.33%, #f7f3ea 33.33% 66.66%, #158046 66.66% 100%); }
  .flag-poland { background: linear-gradient(180deg, #f7f4ee 0 50%, #d4495d 50% 100%); }
  .flag-romania { background: linear-gradient(90deg, #2348a6 0 33.33%, #f0c230 33.33% 66.66%, #c73b42 66.66% 100%); }
  .flag-nigeria { background: linear-gradient(90deg, #1f8f5c 0 33.33%, #f5f4ef 33.33% 66.66%, #1f8f5c 66.66% 100%); }
  .flag-pakistan {
    background:
      radial-gradient(circle at 62% 46%, #f5f4ef 0 14%, transparent 14%),
      radial-gradient(circle at 58% 46%, #1c6b4a 0 14%, transparent 14%),
      linear-gradient(90deg, #f5f4ef 0 22%, #1c6b4a 22% 100%);
  }
  .flag-bangladesh {
    background:
      radial-gradient(circle at 56% 50%, #cf3f4e 0 24%, transparent 24%),
      #14714f;
  }
  .toggle-btn.secondary-btn {
    padding: 6px 10px 5px;
    font-size: .6rem;
    font-weight: 700;
    letter-spacing: .16em;
    border-radius: 9px;
    box-shadow: 0 10px 24px rgba(79, 49, 38, 0.05);
  }
  .toggle-btn.tool-btn {
    min-width: 0;
    flex: 1 1 calc(50% - 6px);
    justify-content: center;
  }
  #layer-toggle .toggle-btn {
    justify-content: center;
  }
  #metric-toggle .toggle-btn.metric-btn {
    width: 100%;
    min-width: 0;
  }
  #btn-home {
    min-width: 88px;
    padding-left: 12px;
    padding-right: 12px;
    font-size: .68rem;
  }

  #search-wrap {
    position: relative; top: auto; right: auto; z-index: 20;
    display: flex; border-radius: 9px; overflow: hidden;
    box-shadow: var(--panel-shadow);
  }
  #search-input {
    width: 260px; padding: 11px 14px 10px;
    font-family: var(--font-ui); font-size: .82rem; font-weight: 500;
    background: var(--panel-strong);
    border: 1px solid var(--panel-border); border-right: none;
    border-radius: 11px 0 0 11px; color: var(--tooltip-text); outline: none;
    backdrop-filter: blur(14px);
  }
  #search-input::placeholder { color: var(--subtitle); }
  #search-input:focus { border-color: var(--search-focus); }
  #search-btn {
    padding: 11px 14px 10px; background: var(--button-active); color: #fff;
    border: none; cursor: pointer; font-size: .9rem;
    border-radius: 0 11px 11px 0; transition: background .15s;
    font-family: var(--font-ui);
  }
  #search-btn:hover { filter: brightness(0.92); }

  .spin {
    display: inline-block; width: 12px; height: 12px;
    border: 1.5px solid rgba(140,50,40,.15); border-top-color: var(--button-active);
    border-radius: 50%; animation: spin .7s linear infinite;
    vertical-align: middle; margin-left: 5px;
  }

  #tooltip {
    position: absolute; z-index: 20;
    background: var(--tooltip-bg);
    border: 1px solid var(--tooltip-border);
    border-radius: 12px; padding: 10px 14px;
    font-family: var(--font-ui);
    font-size: .78rem; line-height: 1.6; color: var(--tooltip-text);
    display: none; white-space: nowrap;
    box-shadow: var(--panel-shadow);
    pointer-events: none;
    backdrop-filter: blur(14px);
  }
  #tooltip.pinned { pointer-events: all; }
  #tooltip.summary-card {
    position: fixed;
    width: min(420px, calc(100vw - 560px));
    min-width: 320px;
    max-width: calc(100vw - 48px);
    white-space: normal;
    padding: 12px 16px 13px;
    border-radius: 14px;
  }
  #tooltip.summary-card .ttag {
    margin-bottom: 3px;
  }
  #tooltip .ttag {
    display: inline-block;
    margin-bottom: 5px;
    font-size: .58rem;
    font-weight: 700;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--legend-accent);
  }
  #tooltip .tarea  { color: var(--tooltip-text); font-size: .92rem; font-weight: 700; }
  #tooltip .tval   { color: var(--legend-accent); font-weight: 700; }
  #tooltip .tsub   { color: var(--tooltip-subtle); font-size: .66rem; letter-spacing: .03em; }
  #tooltip .tclose {
    float: right; margin-left: 10px; cursor: pointer;
    color: var(--subtitle); font-size: .7rem; line-height: 1;
  }
  #tooltip .tclose:hover { color: var(--legend-accent); }

  #bottom-left-stack {
    position: absolute;
    bottom: 26px;
    left: 24px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
    width: min(388px, calc(100vw - 48px));
    max-width: min(388px, calc(100vw - 48px));
    pointer-events: none;
  }
  #legend {
    position: relative;
    width: 100%;
    min-width: 0;
    padding: 18px 20px 18px;
    border: 1px solid var(--panel-border);
    background: linear-gradient(180deg, var(--panel-strong), var(--panel));
    border-radius: 14px;
    box-shadow: var(--panel-shadow);
    backdrop-filter: blur(16px);
  }
  #legend .llbl { font-family: var(--font-ui); font-size: .83rem; font-weight: 600; letter-spacing: .01em; text-transform: none; color: color-mix(in srgb, var(--title) 88%, var(--subtitle) 12%); margin-bottom: 13px; }
  #legend .lbar { width: 100%; max-width: none; height: 12px; border-radius: 999px; margin-bottom: 10px;
    background-image: linear-gradient(to right, rgba(253,228,140,.9), #f4a350, #d55e58, #a52674, #560b6b, #0e0430);
    background-size: 100% 100%;
    background-repeat: no-repeat; }
  #legend .lends { display: flex; justify-content: space-between; font-size: .81rem; color: var(--legend-text); gap: 12px; }
  #legend .lavg  { margin-top: 12px; font-size: .79rem; letter-spacing: .02em; color: var(--legend-text); }
  #legend .lmeta { margin-top: 9px; max-width: 320px; font-size: .68rem; line-height: 1.5; color: var(--hint); }
  #analysis-panel {
    position: absolute;
    top: 116px;
    right: 24px;
    bottom: 120px;
    z-index: 10;
    display: none;
    flex-direction: column;
    width: clamp(380px, 33vw, 620px);
    max-width: calc(100vw - 48px);
    border: 1px solid var(--panel-border);
    background: linear-gradient(180deg, var(--panel-strong), var(--panel));
    border-radius: 14px;
    box-shadow: var(--panel-shadow);
    backdrop-filter: blur(16px);
    overflow: hidden;
  }
  #analysis-panel .analysis-panel-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    padding: 16px 18px 14px;
    border-bottom: 1px solid color-mix(in srgb, var(--panel-border) 84%, transparent);
    flex: 0 0 auto;
  }
  #analysis-panel .analysis-head-copy {
    min-width: 0;
  }
  #analysis-panel .analysis-title {
    font-family: var(--font-ui);
    font-size: .68rem;
    font-weight: 800;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--subtitle);
  }
  #analysis-panel .analysis-subtitle {
    margin-top: 5px;
    font-family: var(--font-ui);
    font-size: .78rem;

function zoneAt(lon, lat) {
  let best = null, bestD = Infinity;
  for (const z of ZONES) {
    const d = Math.hypot(z.lon - lon, z.lat - lat);
    if (d < (z.r ?? 0.01) && d < bestD) { bestD = d; best = z.name; }
  }
  if (best) return best;
  for (const z of ZONES) {
    const d = Math.hypot(z.lon - lon, z.lat - lat);
    if (d < bestD) { bestD = d; best = z.name; }
  }
  return best ?? "London";
}

let ACTIVE_FEATURES = [];

function pointInPolygon(lon, lat, ring) {
  let inside = false;
  for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
    const xi = ring[i][0], yi = ring[i][1];
    const xj = ring[j][0], yj = ring[j][1];
    if (((yi > lat) !== (yj > lat)) &&
        (lon < (xj - xi) * (lat - yi) / (yj - yi) + xi))
      inside = !inside;
  }
  return inside;
}

function featureAt(lon, lat) {
  for (const f of ACTIVE_FEATURES) {
    const geo = f.geometry;
    if (!geo) continue;
    const hit = geo.type === "Polygon"
      ? pointInPolygon(lon, lat, geo.coordinates[0])
      : geo.type === "MultiPolygon"
        ? geo.coordinates.some((p) => pointInPolygon(lon, lat, p[0]))
        : false;
    if (hit) return f;
  }
  return null;
}

function statsAt(lon, lat) {
  const f = featureAt(lon, lat);
  if (!f) return { density: 0, population: 0 };
  return {
    density: f.properties.density ?? 0,
    population: f.properties[POP_FIELD] ?? 0,
  };
}

async function forwardGeocode(q) {
  try {
    const r = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q + ", London")}&format=json&limit=1&countrycodes=gb&accept-language=en`,
      { headers: { "User-Agent": "LondonPopMap/1.0" } }
    );
    const d = await r.json();
    if (!d.length) return null;
    return { lon: parseFloat(d[0].lon), lat: parseFloat(d[0].lat), name: d[0].display_name.split(",")[0] };
  } catch { return null; }
}

function pickTubeColour(lines, theme) {
  const tokens = (lines || "").toLowerCase().split(/[,/]/).map((s) => s.trim()).filter(Boolean);
  let selected = null;
  for (const [key, rgb] of Object.entries(TUBE_LINE_COLOURS)) {
    if (tokens.some((token) => token.includes(key))) { selected = rgb; break; }
  }
  selected = selected || [50, 104, 111];
  return theme === "night" ? mixRgb(selected, [255, 255, 255], 0.16) : selected;
}

    type: "FeatureCollection",
    features: (raw.features || []).map((feature) => {
      const lines = feature.properties?.LINES || feature.properties?.MODES || "";
      return {
        type: "Feature",
        geometry: feature.geometry,
        properties: {
          stationName: feature.properties?.NAME || "Station",
          lines,
          modes: feature.properties?.MODES || "",
          nightTube: feature.properties?.NIGHT_TUBE || "",
          markerDay: pickTubeColour(lines, "day"),
          markerNight: pickTubeColour(lines, "night"),
        },
      };
    }),
  };
}

function boroughFeatureForPoint(lon, lat, boroughFeatures = municipiGeoJSON?.features) {
  if (!boroughFeatures) return null;
  for (const f of boroughFeatures) {
    const geo = f.geometry;
    if (!geo) continue;
    const hit = geo.type === "Polygon"
      ? pointInPolygon(lon, lat, geo.coordinates[0])
      : geo.type === "MultiPolygon"
        ? geo.coordinates.some((p) => pointInPolygon(lon, lat, p[0]))
        : false;
    if (hit) return f;
  }
  return null;
}

function computeStationAccessData(stationsFeatureCollection, boroughFeatureCollection) {
  const boroughFeatures = boroughFeatureCollection?.features || [];
  if (!stationsFeatureCollection?.features?.length || !boroughFeatures.length) {
    return { byBorough: {}, londonRate: null };
  }

  const counts = Object.fromEntries(
    boroughFeatures
      .map((feature) => feature.properties?.[NAME_FIELD])
      .filter(Boolean)
      .map((name) => [name, 0])
  );

  for (const station of stationsFeatureCollection.features) {
    const coords = station.geometry?.coordinates;
    if (!Array.isArray(coords) || coords.length < 2) continue;
    const boroughFeature = boroughFeatureForPoint(coords[0], coords[1], boroughFeatures);
    const boroughName = boroughFeature?.properties?.[NAME_FIELD];
    if (boroughName && counts[boroughName] != null) counts[boroughName] += 1;
  }

  let londonStations = 0;
  let londonPopulation = 0;
  const byBorough = {};

  for (const feature of boroughFeatures) {
    const boroughName = feature.properties?.[NAME_FIELD];
    if (!boroughName) continue;
    const stationCount = counts[boroughName] || 0;
    const population = feature.properties?.[POP_FIELD] ?? 0;
    const rate = population ? +(stationCount / population * 10000).toFixed(2) : null;
    byBorough[boroughName] = {
      station_count: stationCount,
      station_access_per_10k: rate,
    };
    londonStations += stationCount;
    londonPopulation += population;
  }

  return {
    byBorough,
    londonRate: londonPopulation ? +(londonStations / londonPopulation * 10000).toFixed(2) : null,
  };
}

function normalizeLineName(name) {
  return (name || "")
    .toLowerCase()
    .replace(/[_-]/g, " ")
    .replace(/\s+/g, " ")
    .replace(/ line$/, "")
    .trim();
}

function transformTubeLines(raw) {
  const collection = topojson.feature(raw, raw.objects.line);
  return {
    type: "FeatureCollection",
    features: (collection.features || []).map((feature) => {
      const lineName = feature.id || feature.properties?.name || "Tube";
      return {
        type: "Feature",
        geometry: feature.geometry,
        properties: {
          lineName,
          markerDay: pickTubeColour(lineName, "day"),
          markerNight: pickTubeColour(lineName, "night"),
          lineKey: normalizeLineName(lineName),
        },
      };
    }),
  };
}

function formatLineLabel(name) {
  return (name || "Tube")
    .replace(/\bHammersmith & city\b/i, "Hammersmith & City")
    .replace(/\bTfl\b/i, "TfL")
    .replace(/\bDlr\b/i, "DLR")
    .replace(/\bLu\b/i, "LU");
}

function splitStationLines(lines, modes) {
  const raw = (lines || modes || "")
    .split(/[,/]/)
    .map((item) => item.trim())
    .filter(Boolean);
  const seen = new Set();
  const cleaned = [];
  for (const item of raw) {
    const key = normalizeLineName(item);
    if (!key || seen.has(key)) continue;
    seen.add(key);
    cleaned.push({ key, name: formatLineLabel(item) });
  }
  return cleaned;
}

    fetch("london_boroughs.geojson").then((r) => r.json()).catch(() => null),
    fetch("london_msoa_density.geojson").then((r) => r.json()).catch(() => null),
    fetch("london_msoa_pubs.json").then((r) => r.json()).catch(() => null),
    fetch("london_thames.geojson").then((r) => r.json()).catch(() => null),
    fetch(TFL_STATIONS_URL).then((r) => r.json()).catch(() => null),

  if (rawStationsGeoJSON) stationsGeoJSON = transformStations(rawStationsGeoJSON);
  if (rawTubeLines) tubeLinesGeoJSON = transformTubeLines(rawTubeLines);
  if (msoaDensityGeoJSON?.features) msoaGeoJSON = msoaDensityGeoJSON;
  if (msoaPubsJson?.by_msoa) msoaPubMeta = msoaPubsJson;
  const stationAccessData = computeStationAccessData(stationsGeoJSON, municipiGeoJSON);
  stationAccessLondonAvg = stationAccessData.londonRate;
  for (const [boroughName, stationMetrics] of Object.entries(stationAccessData.byBorough || {})) {
    if (BOROUGH_METRIC_DATA[boroughName]) Object.assign(BOROUGH_METRIC_DATA[boroughName], stationMetrics);
  }
  for (const [boroughName, medianAge] of Object.entries(MEDIAN_AGE_DATA)) {
    if (BOROUGH_METRIC_DATA[boroughName]) BOROUGH_METRIC_DATA[boroughName].median_age_years = medianAge;

  for (const [boroughName, pubMetrics] of Object.entries(PUB_DENSITY_DATA)) {

  for (const [boroughName, buildingMetrics] of Object.entries(BUILDING_DENSITY_DATA)) {

  }
  for (const [boroughName, greenspaceShare] of Object.entries(GREENSPACE_SHARE_DATA)) {
    if (BOROUGH_METRIC_DATA[boroughName]) BOROUGH_METRIC_DATA[boroughName].greenspace_share_pct = greenspaceShare;
  }
  if (msoaGeoJSON?.features && msoaPubMeta?.by_msoa) {
    for (const feature of msoaGeoJSON.features) {
      const code = feature.properties?.msoa_code;
      const pubMetrics = code ? msoaPubMeta.by_msoa[code] : null;
      if (!pubMetrics) continue;
      Object.assign(feature.properties, pubMetrics);
    }
  }
  if (municipiGeoJSON?.features) {
    for (const feature of municipiGeoJSON.features) {
      const boroughName = feature.properties?.[NAME_FIELD];
      const metrics = BOROUGH_METRIC_DATA[boroughName];
      const countryBirth = BOROUGH_COUNTRY_BIRTH_DATA[boroughName];
      if (!metrics) continue;
      Object.assign(feature.properties, metrics, {
        gender_balance_pp: metrics.male_share_pct != null ? +(metrics.male_share_pct - 50).toFixed(2) : null,
        country_birth: countryBirth || null,
        country_birth_top_country: countryBirth?.top_country || null,
        country_birth_top_country_pct: countryBirth?.top_country_pct ?? null,

  }

  function featureCollectionForAnalysis() {
    if (currentDataset === "municipi" && activeGeography === "msoa" && (boroughMetric === "density" || boroughMetric === "pubs_per_km2_msoa") && msoaGeoJSON?.features) {
      return msoaGeoJSON;

  function activeAnalysisFeatures() {

  function analysisFeatureName(feature) {

  function boroughAt(lon, lat) {
    const boroughFeatures = municipiGeoJSON?.features;
    if (!boroughFeatures) return zoneAt(lon, lat);
    for (const f of boroughFeatures) {
      const geo = f.geometry;
      if (!geo) continue;
      const hit = geo.type === "Polygon"
        ? pointInPolygon(lon, lat, geo.coordinates[0])
        : geo.type === "MultiPolygon"
          ? geo.coordinates.some((p) => pointInPolygon(lon, lat, p[0]))
          : false;
      if (hit) return f.properties[NAME_FIELD] ?? "London";

    return zoneAt(lon, lat);

  ACTIVE_FEATURES = sectionsGeoJSON.features;

  if (!municipiGeoJSON) {

  const totalPopulation = sectionsGeoJSON.features.reduce((sum, f) => sum + (f.properties[POP_FIELD] ?? 0), 0);
  const totalArea = sectionsGeoJSON.features.reduce((sum, f) => sum + (f.properties.area_km2 ?? 0), 0);
  const avgDensity = totalArea > 0 ? Math.round(totalPopulation / totalArea) : 0;
  const validSectionFeatures = sectionsGeoJSON.features.filter((f) => validSectionDensity(f, "flat"));
  const validSpikeFeatures = sectionsGeoJSON.features.filter((f) => validSectionDensity(f, "spike"));
  const sectionDensityMax = Math.max(...validSectionFeatures.map((f) => f.properties.density));
  const sortedSpikeDensities = validSpikeFeatures.map((f) => f.properties.density).sort((a, b) => a - b);
  const quantileFromSorted = (sorted, q) => sorted[Math.min(sorted.length - 1, Math.floor((sorted.length - 1) * q))] || 0;
  const spikeMedianDensity = quantileFromSorted(sortedSpikeDensities, 0.5) || sectionDensityMax;
  const spikeUpperMidDensity = quantileFromSorted(sortedSpikeDensities, 0.85) || sectionDensityMax;
  const spikeHighDensity = quantileFromSorted(sortedSpikeDensities, 0.97) || sectionDensityMax;
  const spikeRenderMax = quantileFromSorted(sortedSpikeDensities, SPIKE_RENDER_QUANTILE) || sectionDensityMax;
  const boroughStats = {};
  const msoaDensityStats = (() => {
    if (!msoaGeoJSON?.features?.length) return {};
    const build = (year) => {
      const densityField = `density_${year}`;
      const populationField = `population_${year}`;
      const values = msoaGeoJSON.features
        .map((feature) => feature.properties?.[densityField])
        .filter((value) => Number.isFinite(value));
      const weighted = msoaGeoJSON.features.reduce((acc, feature) => {
        const density = feature.properties?.[densityField];
        const weight = feature.properties?.[populationField] ?? 0;
        if (!Number.isFinite(density) || !weight) return acc;
        acc.total += density * weight;
        acc.weight += weight;
        return acc;
      }, { total: 0, weight: 0 });
      return {
        min: Math.min(...values),
        max: Math.max(...values),
        avg: weighted.weight ? weighted.total / weighted.weight : values.reduce((sum, value) => sum + value, 0) / values.length,
      };
    };
    return { 2021: build(2021), 2024: build(2024) };
  })();
  const msoaPubStats = (() => {
    if (!msoaGeoJSON?.features?.length) return null;
    const values = msoaGeoJSON.features
      .map((feature) => feature.properties?.pubs_per_km2_msoa)
      .filter((value) => Number.isFinite(value));
    if (!values.length) return null;
    return {
      min: Math.min(...values),
      max: Math.max(...values),
      avg: Number.isFinite(msoaPubMeta?.london_avg_pubs_per_km2_msoa)
        ? msoaPubMeta.london_avg_pubs_per_km2_msoa
        : values.reduce((sum, value) => sum + value, 0) / values.length,
    };
  })();

  function getNationalityMetricConfig() {
    if (selectedCountryBirth === "ALL") {
      return {
        ...METRICS.country_of_birth_pct,
        label: "Origin · born outside the UK",
        legendLabel: "Residents born outside the UK",

    return {
      ...METRICS.country_of_birth_pct,
      label: `Origin · ${selectedCountryBirth}-born residents`,
      legendLabel: `${selectedCountryBirth}-born residents`,
      source: `${METRICS.country_of_birth_pct.source} · ${selectedCountryBirth}`,
    };
  }

  function getMetricConfigFor(metricKey, countrySelection = selectedCountryBirth) {
    if (metricKey === "country_of_birth_pct") {
      if (countrySelection === "ALL") {
        return {
          ...METRICS.country_of_birth_pct,
          label: "Origin · born outside the UK",
          legendLabel: "Residents born outside the UK",
          source: `${METRICS.country_of_birth_pct.source} · overview`,
          note: "Tooltip shows both UK-born and not-UK-born shares",
        };

      return {
        ...METRICS.country_of_birth_pct,

        legendLabel: `${countrySelection}-born residents`,
        source: `${METRICS.country_of_birth_pct.source} · ${countrySelection}`,

    return METRICS[metricKey];
  }

  function getMetricConfig(metricKey) {
    if (metricKey === "density" && currentDataset === "municipi" && activeGeography === "msoa") {
      return {
        ...METRICS.density,
        label: "Population density",
        legendLabel: "Residents per km²",
        year: String(activeYear),
        source: SMALL_AREA_DENSITY.source,
        geography: SMALL_AREA_DENSITY.geography,
        note: SMALL_AREA_DENSITY.note,
      };
    }
    if (metricKey === "pubs_per_km2_msoa" && currentDataset === "municipi" && activeGeography === "msoa") {
      return {
        ...METRICS.pubs_per_km2_msoa,
        year: msoaPubMeta?.snapshot_date || METRICS.pubs_per_km2_msoa.year,
        source: msoaPubMeta?.source || SMALL_AREA_PUBS.source,
        geography: msoaPubMeta?.geography || SMALL_AREA_PUBS.geography,
        note: msoaPubMeta?.note || SMALL_AREA_PUBS.note,
      };
    }
    return getMetricConfigFor(metricKey, selectedCountryBirth);
  }

  function availableMetricValues(metricKey) {
    if (!municipiGeoJSON?.features) return [];
    return municipiGeoJSON.features
      .map((feature) => metricValue(feature, metricKey))
      .filter((value) => Number.isFinite(value));
  }

  for (const [metricKey, metric] of Object.entries(METRICS)) {
    if (!metric.views.includes("municipi")) continue;
    const values = availableMetricValues(metricKey);
    if (!values.length) continue;
    const populationWeighted = municipiGeoJSON.features.reduce((acc, feature) => {
      const value = metricValue(feature, metricKey);
      const weight = feature.properties?.[POP_FIELD] ?? 0;
      if (!Number.isFinite(value) || !weight) return acc;
      acc.total += value * weight;
      acc.weight += weight;
      return acc;
    }, { total: 0, weight: 0 });
    boroughStats[metricKey] = {
      min: Math.min(...values),
      max: Math.max(...values),
      avg: populationWeighted.weight ? populationWeighted.total / populationWeighted.weight : values.reduce((sum, value) => sum + value, 0) / values.length,
      maxAbs: metric.scale === "diverging" ? Math.max(...values.map((value) => Math.abs(value - (metric.center ?? 0)))) : null,
    };
  }

  function getMetricStats(metricKey, countrySelection = selectedCountryBirth) {
    if (metricKey === "density" && currentDataset === "municipi" && activeGeography === "msoa") {
      return msoaDensityStats[activeYear];
    }
    if (metricKey === "pubs_per_km2_msoa" && currentDataset === "municipi" && activeGeography === "msoa") {
      return msoaPubStats;
    }
    if (metricKey === "station_access_per_10k") {
      return {
        ...boroughStats[metricKey],
        avg: stationAccessLondonAvg,
      };
    }
    if (metricKey === "median_age_years") {
      return {
        ...boroughStats[metricKey],
        avg: MEDIAN_AGE_LONDON,
      };
    }
    if (metricKey === "pubs_per_km2") {
      return {
        ...boroughStats[metricKey],
        avg: PUB_DENSITY_LONDON_AVG,
      };
    }
    if (metricKey === "buildings_per_km2") {
      return {
        ...boroughStats[metricKey],
        avg: BUILDING_DENSITY_LONDON_AVG,
      };
    }
    if (metricKey === "greenspace_share_pct") {
      return {
        ...boroughStats[metricKey],
        avg: GREENSPACE_LONDON_AVG,
      };
    }
    if (metricKey === "country_of_birth_pct") {
      const values = municipiGeoJSON.features
        .map((feature) => metricValue(feature, metricKey, countrySelection))
        .filter((value) => Number.isFinite(value));
      const populationWeighted = municipiGeoJSON.features.reduce((acc, feature) => {
        const value = metricValue(feature, metricKey, countrySelection);
        const weight = feature.properties?.[POP_FIELD] ?? 0;
        if (!Number.isFinite(value) || !weight) return acc;
        acc.total += value * weight;
        acc.weight += weight;
        return acc;
      }, { total: 0, weight: 0 });
      return {
        min: Math.min(...values),
        max: Math.max(...values),
        avg: populationWeighted.weight ? populationWeighted.total / populationWeighted.weight : 0,
      };

    return boroughStats[metricKey];
  }

  function metricGradientCss(metricKey) {
    if (metricKey === "gender_balance_pp") {
      return "linear-gradient(to right, rgba(34,94,168,.95), rgba(238,242,247,.92), rgba(175,40,77,.95))";

  function interpolatedMetricColor(metricKey, t) {
    const palette = METRIC_PALETTES[metricKey] || METRIC_PALETTES.density;
    return lerp(palette[Math.floor(Math.min(Math.max(t, 0), 1) * (palette.length - 1))], palette[Math.min(Math.floor(Math.min(Math.max(t, 0), 1) * (palette.length - 1)) + 1, palette.length - 1)], (Math.min(Math.max(t, 0), 1) * (palette.length - 1)) % 1);
  }

  function metricValue(feature, metricKey, countrySelection = selectedCountryBirth) {
    if (metricKey === "density" && currentDataset === "municipi" && activeGeography === "msoa") {
      return feature?.properties?.[activeDensityField()] ?? null;
    }
    if (metricKey === "pubs_per_km2_msoa" && currentDataset === "municipi" && activeGeography === "msoa") {
      return feature?.properties?.pubs_per_km2_msoa ?? null;
    }
    if (metricKey === "country_of_birth_pct") {
      if (countrySelection === "ALL") {
        return feature?.properties?.not_born_uk_share_pct ?? null;
      }
      return feature?.properties?.country_birth?.[countrySelection] ?? null;
    }
    return feature?.properties?.[metricKey];
  }

  function analysisModeAvailable(mode) {
    if (!mode) return true;
    const boroughOnly = currentDataset === "municipi" && activeGeography === "borough";
    if (["compare", "why-here", "similar", "correlation", "story"].includes(mode)) return boroughOnly;
    return false;

  function similarityAvailable() {

  function correlationAvailable() {

  function correlationMetricConfig(metricKey) {
    return getMetricConfigFor(metricKey, metricKey === "country_of_birth_pct" ? "ALL" : selectedCountryBirth);
  }

  function correlationMetricValue(feature, metricKey) {

  function correlationFeatureByName(name) {

    return municipiGeoJSON.features.find((feature) => feature.properties?.[NAME_FIELD] === name) || null;

  function correlationPinnedFeature() {

  function correlationFocusFeature() {

  function correlationAxisLabel(metricKey) {
    const metric = correlationMetricConfig(metricKey);
    if (metricKey === "density") return "Density (res/km²)";
    if (metricKey === "house_price_proxy_gbp") return "House prices (£)";
    if (metricKey === "median_weekly_earnings_gbp") return "Earnings (£/week)";
    if (metricKey === "children_share_pct") return "Children (%)";
    if (metricKey === "country_of_birth_pct") return "Origin · born outside UK (%)";
    if (metricKey === "pubs_per_km2") return "Pubs density (pubs/km²)";
    if (metricKey === "buildings_per_km2") return "Buildings density (buildings/km²)";
    if (metricKey === "greenspace_share_pct") return "Greenspace share (2005, %)";
    if (metricKey === "median_age_years") return "Median age (years)";
    if (metricKey === "station_access_per_10k") return "Station access (/10k residents)";
    return metric.label;

  function correlationScatterData() {
    if (!municipiGeoJSON?.features) return [];
    return municipiGeoJSON.features
      .map((feature) => {

        const y = correlationMetricValue(feature, correlationYMetric);

  function correlationMetricOptionsHtml(selectedMetric) {

  function setCorrelationHover(name) {
    const next = name || null;
    if (correlationHoverName === next) return;
    correlationHoverName = next;

  function spotlightFeature() {
    if (!isAnalysisMode("why-here") || !spotlightAvailable() || !tooltipPinned || !pinnedCoord) return null;
    const feature = featureAt(...pinnedCoord);
    return feature?.properties?.[NAME_FIELD] ? feature : null;
  }

  function similarityFeature() {
    if (!isAnalysisMode("similar") || !similarityAvailable() || !tooltipPinned || !pinnedCoord) return null;
    const feature = featureAt(...pinnedCoord);
    return feature?.properties?.[NAME_FIELD] ? feature : null;
  }

  function comparisonCountrySelection() {
    return boroughMetric === "country_of_birth_pct" ? "ALL" : selectedCountryBirth;
  }

  function comparisonFeature(name) {
    if (!name || !municipiGeoJSON?.features) return null;
    return municipiGeoJSON.features.find((feature) => feature.properties?.[NAME_FIELD] === name) || null;
  }

  function normalizeComparisonSelections() {
    if (!comparisonA && comparisonB) {
      comparisonA = comparisonB;
      comparisonB = null;
    }
    if (comparisonA && comparisonB && comparisonA === comparisonB) {
      comparisonB = null;
    }
  }

  function comparisonMetricValue(feature) {
    return metricValue(feature, boroughMetric, comparisonCountrySelection());
  }

  function comparisonMetricConfig() {
    return getMetricConfigFor(boroughMetric, comparisonCountrySelection());
  }

  function similarityMetricValue(feature, metricDef) {
    if (!feature || !metricDef) return null;
    return metricValue(feature, metricDef.key, metricDef.countrySelection ?? selectedCountryBirth);
  }

  function similarityMetricStats(metricDef) {
    if (!municipiGeoJSON?.features?.length) return null;
    const values = municipiGeoJSON.features
      .map((feature) => similarityMetricValue(feature, metricDef))
      .filter((value) => Number.isFinite(value));
    if (!values.length) return null;
    const mean = values.reduce((sum, value) => sum + value, 0) / values.length;
    const variance = values.reduce((sum, value) => sum + ((value - mean) ** 2), 0) / values.length;
    const std = Math.sqrt(variance);
    if (!Number.isFinite(std) || std === 0) return null;
    return { mean, std };
  }

  function similarityReasonLabel(metricDef) {
    return metricDef.reasonLabel || metricDef.label;
  }

  function similarityDirectionLabel(metricDef, value, otherValue) {
    if (!Number.isFinite(value) || !Number.isFinite(otherValue)) return null;
    if (Math.abs(value - otherValue) < 1e-9) return "nearly identical";
    const direction = otherValue > value ? "slightly higher" : "slightly lower";
    return `${direction} ${similarityReasonLabel(metricDef)}`;
  }

  function similarityExplanation(differences, target, candidate) {
    if (!differences.length) return "Closest overall borough profile.";
    const closest = differences.slice(0, 2);
    if (closest.length === 1) return `Closest on ${similarityReasonLabel(closest[0].metric)}.`;
    const [first, second] = closest;
    const primary = `Similar ${similarityReasonLabel(first.metric)} and ${similarityReasonLabel(second.metric)}.`;
    const direction = similarityDirectionLabel(first.metric, first.targetValue, first.candidateValue);
    return direction ? `${primary} ${candidate.properties?.[NAME_FIELD]} is ${direction}.` : primary;
  }

  function similarityResultsForFeature(feature) {
    if (!feature || !municipiGeoJSON?.features?.length) return [];

    const metricContexts = SIMILARITY_METRICS
      .map((metric) => ({ metric, stats: similarityMetricStats(metric) }))
      .filter((entry) => entry.stats);

    const results = [];
    for (const candidate of municipiGeoJSON.features) {
      if (!candidate?.properties?.[NAME_FIELD]) continue;
      if (candidate.properties[NAME_FIELD] === feature.properties?.[NAME_FIELD]) continue;

      const diffs = [];
      for (const entry of metricContexts) {
        const targetValue = similarityMetricValue(feature, entry.metric);
        const candidateValue = similarityMetricValue(candidate, entry.metric);
        if (!Number.isFinite(targetValue) || !Number.isFinite(candidateValue)) continue;
        const targetZ = (targetValue - entry.stats.mean) / entry.stats.std;
        const candidateZ = (candidateValue - entry.stats.mean) / entry.stats.std;
        diffs.push({
          metric: entry.metric,
          diff: Math.abs(targetZ - candidateZ),
          targetValue,
          candidateValue,
        });
      }

      if (diffs.length < 4) continue;
      diffs.sort((a, b) => a.diff - b.diff);
      const distance = Math.sqrt(diffs.reduce((sum, entry) => sum + (entry.diff ** 2), 0) / diffs.length);
      results.push({
        feature: candidate,
        distance,
        reasons: diffs,
        explanation: similarityExplanation(diffs, feature, candidate),
      });
    }

    return results
      .sort((a, b) => a.distance - b.distance)
      .slice(0, 3)
      .map((entry, index) => ({ ...entry, rank: index + 1 }));
  }

  function formatMetricValueFor(metricKey, value, countrySelection = selectedCountryBirth) {
    if (!Number.isFinite(value)) return "n/a";
    return getMetricConfigFor(metricKey, countrySelection).formatter(value);
  }

  function comparisonDifferenceLabel(metricKey, delta) {
    if (!Number.isFinite(delta)) return "n/a";
    const sign = delta > 0 ? "+" : delta < 0 ? "−" : "±";
    const absValue = Math.abs(delta);
    const metric = getMetricConfigFor(metricKey, comparisonCountrySelection());
    if (metric.diffFormatter) return `${sign}${metric.diffFormatter(absValue)}`;
    return `${sign}${formatMetricValueFor(metricKey, absValue, comparisonCountrySelection())}`;
  }

  function comparisonDifferenceTone(delta) {
    if (!Number.isFinite(delta) || delta === 0) return "neutral";
    return delta > 0 ? "positive" : "negative";
  }

  function comparisonDifferenceNote(delta) {
    if (!Number.isFinite(delta) || delta === 0) return "No meaningful gap";
    return delta > 0 ? "B higher than A" : "B lower than A";
  }

  function spotlightDeltaText(metricKey, value, average, countrySelection = selectedCountryBirth) {
    if (!Number.isFinite(value) || !Number.isFinite(average)) return "No London baseline";
    const delta = value - average;

      return Number.isFinite(buildingCount)
        ? `${buildingCount.toLocaleString()} mapped building footprints in the OSM snapshot`
        : "OpenStreetMap building footprint snapshot aggregated to borough polygons";
    }
    if (boroughMetric === "median_age_years") {
      return "Census 2021 median age of usual residents";
    }
    if (boroughMetric === "greenspace_share_pct") {
      return "Historical land-use baseline · GLUD 2005 Greenspace class";
    }
    return "";
  }

  function comparisonInstructionText() {
    if (!comparisonA) return "Click a borough to start a side-by-side comparison.";
    if (!comparisonB) return "Select a second borough to compare against Borough A.";
    return "Click another borough to replace Borough B, or click a selected borough to clear it.";
  }

  function getActiveMetricState() {
    const metricKey = boroughMetric;
    return {
      metricKey,
      countrySelection: selectedCountryBirth,
      geography: activeGeography,
      year: activeYear,
      metric: getMetricConfig(metricKey),
      stats: getMetricStats(metricKey, selectedCountryBirth),
      fillAlpha: boroughFillAlpha(),
      theme: currentTheme,
    };
  }

  function effectiveMetricKey() {
    return currentDataset === "municipi" ? boroughMetric : "density";
  }

  function pubsScope() {
    return boroughMetric === "pubs_per_km2_msoa" ? "msoa" : "borough";
  }

  function pubsMetricActive() {
    return boroughMetric === "pubs_per_km2" || boroughMetric === "pubs_per_km2_msoa";
  }

  function activeMetricFamilyKey() {
    if (pubsMetricActive()) return "pubs_per_km2";
    return boroughMetric;
  }

  function metricAvailableInCurrentView(metricKey) {
    const currentView = currentDataset === "tube" ? "tube" : is3D ? "spikes" : currentDataset;
    if (metricKey === "station_access_per_10k" && !Number.isFinite(stationAccessLondonAvg)) return false;
    if (metricKey === "pubs_per_km2_msoa" && (!msoaGeoJSON?.features?.length || !msoaPubMeta?.by_msoa || !msoaPubStats)) return false;
    return METRICS[metricKey].views.includes(currentView);
  }

  function geographyAvailableInCurrentView(geography) {
    if (currentDataset !== "municipi" || boroughMetric !== "density") return geography === "borough";
    if (geography === "borough") return true;
    return geography === "msoa" && !!msoaGeoJSON?.features?.length;
  }

  function colorFor(feature, dataset) {
    const density = feature.properties.density ?? 0;
    if (dataset === "sections" && !validSectionDensity(feature, "flat")) return OUTLIER_COLOR;
    return hexColor(Math.min(density / sectionDensityMax, 1));
  }

  function validSectionDensity(feature, mode = "flat") {
    const density = feature?.properties?.density ?? 0;
    const area = feature?.properties?.area_km2 ?? null;
    if (!Number.isFinite(density) || density <= 0 || density > OUTLIER_THRESHOLD) return false;
    if (mode === "spike" && Number.isFinite(area) && area < MIN_HEX_SPIKE_AREA_KM2) return false;
    return true;
  }

  function boroughMetricColor(feature, metricState = getActiveMetricState()) {
    const { metricKey, metric, countrySelection, stats, fillAlpha, theme } = metricState;
    const value = metricValue(feature, metricKey, countrySelection);
    if (!Number.isFinite(value)) return theme === "night" ? [70, 78, 88, fillAlpha] : [206, 211, 216, fillAlpha];
    if (metric.scale === "diverging") {
      const spread = stats?.maxAbs || 1;
      const t = ((value - (metric.center ?? 0)) / (spread || 1) + 1) / 2;
      const rgb = t < 0.5
        ? lerp([34, 94, 168, 255], [238, 242, 247, 255], t / 0.5)
        : lerp([238, 242, 247, 255], [175, 40, 77, 255], (t - 0.5) / 0.5);
      return [...rgb.slice(0, 3), fillAlpha];
    }
    const t = stats && stats.max > stats.min ? (value - stats.min) / (stats.max - stats.min) : 0;
    return [...interpolatedMetricColor(metricKey, t).slice(0, 3), fillAlpha];
  }

  function elevationFor(feature, dataset) {
    const density = feature.properties.density ?? 0;
    if (dataset === "sections" && !validSectionDensity(feature, "spike")) return 0;
    const clamped = Math.min(density, spikeRenderMax);
    let scaled = 0;
    if (clamped <= spikeMedianDensity) {
      const t = spikeMedianDensity > 0 ? clamped / spikeMedianDensity : 0;
      scaled = Math.pow(t, 0.92) * 0.16;
    } else if (clamped <= spikeUpperMidDensity) {
      const span = Math.max(spikeUpperMidDensity - spikeMedianDensity, 1);
      const t = (clamped - spikeMedianDensity) / span;
      scaled = 0.16 + Math.pow(t, 0.9) * 0.3;
    } else if (clamped <= spikeHighDensity) {
      const span = Math.max(spikeHighDensity - spikeUpperMidDensity, 1);
      const t = (clamped - spikeUpperMidDensity) / span;
      scaled = 0.46 + Math.pow(t, 0.82) * 0.36;
    } else {
      const span = Math.max(spikeRenderMax - spikeHighDensity, 1);
      const t = (clamped - spikeHighDensity) / span;
      scaled = 0.82 + t * 0.18;
    }
    return scaled * TARGET_HEIGHT_M;
  }

  function transportOverlayVisible() {
    return currentDataset === "tube" || (currentDataset === "municipi" && showStations);
  }

  function onlyTubeMode() {
    return currentDataset === "tube";
  }

  function tubeLegendVisible() {
    return currentDataset === "tube" || (currentDataset === "municipi" && showStations);

  function boroughFillAlpha() {
    if (onlyTubeMode()) return THEMES[currentTheme].tubeContextFillAlpha;
    if (currentDataset === "municipi" && showStations) return THEMES[currentTheme].municipiTubeFillAlpha;
    return THEMES[currentTheme].municipiFillAlpha;
  }

  function tubeZoomFactor() {
    return Math.max(0.92, Math.min(1.28, 0.86 + (viewState.zoom - 10) * 0.08));
  }

  function makeSectionsLayer() {

    return new deck.GeoJsonLayer({
      id: "sections",

      filled: true, stroked: is3D,
      extruded: is3D, wireframe: false,
      pickable: true, autoHighlight: true,
      highlightColor: [255, 255, 255, currentTheme === "night" ? 58 : 40],
      getFillColor: (f) => colorFor(f, "sections"),
      getElevation: (f) => is3D ? elevationFor(f, "sections") : 0,
      getLineColor: is3D ? (currentTheme === "night" ? [255, 255, 255, 40] : [255, 255, 255, 52]) : [0, 0, 0, 0],
      getLineWidth: is3D ? 1 : 0,

  function makeMunicipiLayer(metricState = getActiveMetricState()) {

        const colour = boroughMetricColor(f, metricState);
        return [...colour.slice(0, 3), fillAlpha];
      },
      getLineColor: THEMES[currentTheme].municipiLine,
      getLineWidth: activeGeography === "msoa" ? 1 : 2, lineWidthMinPixels: activeGeography === "msoa" ? 0.5 : 1,
      updateTriggers: {
        getFillColor: [
          metricState.metricKey,
          metricState.countrySelection,
          metricState.geography,
          metricState.year,
          metricState.fillAlpha,
          metricState.theme,
          metricState.stats?.min ?? null,
          metricState.stats?.max ?? null,
          metricState.stats?.maxAbs ?? null,
        ],
      },

    });

  function makeStationsLayer() {

      getPosition: (f) => f.geometry.coordinates,

      getFillColor: (f) => [...(currentTheme === "night" ? f.properties.markerNight : f.properties.markerDay), Math.round(255 * THEMES[currentTheme].stationOpacity)],
      getLineColor: THEMES[currentTheme].stationStroke,

  function makeTubeLineCaseLayer() {
    if (!transportOverlayVisible() || !tubeLinesGeoJSON) return null;
    return new deck.GeoJsonLayer({
      id: "tube-lines-case",
      data: tubeLinesGeoJSON,
      stroked: true,
      filled: false,
      pickable: false,
      lineWidthUnits: "pixels",
      getLineColor: (f) => {
        if (!onlyTubeMode() || !selectedTubeLineKey) return THEMES[currentTheme].lineCase;
        const active = f.properties?.lineKey === selectedTubeLineKey;

        return [base[0], base[1], base[2], active ? base[3] : Math.round(base[3] * 0.22)];
      },
      getLineWidth: (f) => {
        const base = (onlyTubeMode() ? THEMES[currentTheme].lineCaseWidthOnly : THEMES[currentTheme].lineCaseWidthMixed) * tubeZoomFactor();
        if (!onlyTubeMode() || !selectedTubeLineKey) return base;
        return f.properties?.lineKey === selectedTubeLineKey ? base * 1.08 : base * 0.68;
      },
      lineCapRounded: true,
      lineJointRounded: true,
      updateTriggers: {

        getLineWidth: [currentTheme, selectedTubeLineKey, currentDataset, viewState.zoom],

  function makeTubeLineLayer() {
    if (!transportOverlayVisible() || !tubeLinesGeoJSON) return null;
    return new deck.GeoJsonLayer({
      id: "tube-lines",
      data: tubeLinesGeoJSON,
      stroked: true,
      filled: false,
      pickable: true,
      lineWidthUnits: "pixels",
      getLineColor: (f) => {
        const active = selectedTubeLineKey && f.properties?.lineKey === selectedTubeLineKey;
        const base = currentTheme === "night" ? f.properties.markerNight : f.properties.markerDay;
        if (!onlyTubeMode() || !selectedTubeLineKey) return [...base, 235];
        return [...base, active ? 255 : 54];
      },
      getLineWidth: (f) => {
        const base = (onlyTubeMode() ? THEMES[currentTheme].lineWidthOnly : THEMES[currentTheme].lineWidthMixed) * tubeZoomFactor();
        if (!onlyTubeMode() || !selectedTubeLineKey) return base;
        return f.properties?.lineKey === selectedTubeLineKey ? base * 1.12 : base * 0.7;
      },
      lineCapRounded: true,
      lineJointRounded: true,

        getLineWidth: [currentTheme, selectedTubeLineKey, currentDataset, viewState.zoom],

  function zoneLabel(object, coordinate) {
    if (object?.layer?.id === "stations") return object.properties.stationName || "Station";
    if (object?.layer?.id === "tube-lines") return object.properties.lineName || "Tube line";
    if (currentDataset === "municipi" && activeGeography === "msoa" && object?.properties?.msoa_name) return object.properties.msoa_name;
    if (object?.properties?.[NAME_FIELD] && currentDataset === "municipi") return object.properties[NAME_FIELD];
    if (object?.properties?.[NAME_FIELD] && currentDataset !== "sections") return object.properties[NAME_FIELD];
    if (coordinate) return currentDataset === "municipi" ? boroughAt(coordinate[0], coordinate[1]) : zoneAt(coordinate[0], coordinate[1]);
    const geo = object?.geometry;
    let ring;
    if (geo?.type === "Polygon") ring = geo.coordinates[0];
    else if (geo?.type === "MultiPolygon") ring = geo.coordinates[0]?.[0];
    const cx = ring ? ring.reduce((s, p) => s + p[0], 0) / ring.length : -0.118;
    const cy = ring ? ring.reduce((s, p) => s + p[1], 0) / ring.length : 51.505;
    return currentDataset === "municipi" ? boroughAt(cx, cy) : zoneAt(cx, cy);
  }

  function positionTooltip(x, y) {
    const pad = 14, tw = tooltipEl.offsetWidth, th = tooltipEl.offsetHeight;
    let left = x + pad + tw > innerWidth ? x - tw - pad : x + pad;
    let top = y + pad + th > innerHeight ? y - th - pad : y + pad;

    const occupied = [];
    const analysisRect = getComputedStyle(analysisPanelEl).display !== "none" ? analysisPanelEl.getBoundingClientRect() : null;
    const railRect = leftStackEl?.getBoundingClientRect?.();
    if (analysisRect) occupied.push(analysisRect);
    if (railRect) occupied.push(railRect);

    for (const rect of occupied) {
      const overlaps = left < rect.right && left + tw > rect.left && top < rect.bottom && top + th > rect.top;
      if (!overlaps) continue;
      if (rect.left > innerWidth / 2) {
        left = Math.max(12, rect.left - tw - pad);
      } else {
        left = Math.min(innerWidth - tw - 12, rect.right + pad);
      }
      if (top + th > innerHeight - 12) top = Math.max(12, rect.top - th - pad);
    }

    tooltipEl.style.left = `${left}px`;
    tooltipEl.style.top = `${top}px`;
  }

  function positionPinnedSummaryCard() {
    const pad = 20;
    const tw = tooltipEl.offsetWidth;
    const railRect = leftStackEl?.getBoundingClientRect?.();
    const analysisRect = getComputedStyle(analysisPanelEl).display !== "none" ? analysisPanelEl.getBoundingClientRect() : null;
    const controlsRect = topRightControlsEl?.getBoundingClientRect?.();
    const leftBound = railRect ? railRect.right + pad : pad;
    const rightBound = Math.min(
      analysisRect ? analysisRect.left - pad : innerWidth - pad,
      controlsRect ? controlsRect.left - pad : innerWidth - pad
    );
    const availableWidth = Math.max(tw, rightBound - leftBound);
    const left = rightBound > leftBound
      ? Math.max(leftBound, Math.min(rightBound - tw, leftBound + (availableWidth - tw) / 2))
      : Math.max(pad, innerWidth - tw - pad);

    tooltipEl.style.left = `${left}px`;
    tooltipEl.style.top = `${pad}px`;
  }

  function syncPinnedSelectionState(feature = null) {
    if (!tooltipPinned) {
      highlightedFeature = pinData.length ? featureAt(pinData[0].lon, pinData[0].lat) : null;
    } else if (feature) {
      highlightedFeature = feature;
    } else if (pinnedCoord) {
      highlightedFeature = featureAt(...pinnedCoord);
    }
    deckgl.setProps({ layers: getLayers() });
    renderAnalysisPanel();
  }

  function refreshHighlightedFeature() {
    if (!pinData.length) return;
    const pin = pinData[0];
    highlightedFeature = featureAt(pin.lon, pin.lat);
  }

  function renderPinnedTooltip() {
    if (!tooltipPinned || !pinnedCoord) return;

    const object = featureAt(pinnedCoord[0], pinnedCoord[1]);

    if (currentDataset === "tube") {
      tooltipPinned = false;
      pinnedCoord = null;
      tooltipEl.classList.remove("pinned");
      tooltipEl.style.display = "none";
      return;
    }

    if (currentDataset === "municipi" && object) {
      tooltipEl.classList.add("summary-card");
      tooltipEl.innerHTML = boroughMetricTooltipHtml(object, true);
      tooltipEl.style.display = "block";
      positionPinnedSummaryCard();
      return;
    }

    if (currentDataset === "sections") {
      tooltipEl.classList.remove("summary-card");
      const stats = statsAt(...pinnedCoord);
      const zone = zoneAt(...pinnedCoord);
      tooltipEl.innerHTML = densityTooltipHtml(zone, stats.population, stats.density, true);
      tooltipEl.style.display = "block";
      updatePinnedPosition(viewState);
      return;
    }

    tooltipPinned = false;
    pinnedCoord = null;
    tooltipEl.classList.remove("summary-card");
    tooltipEl.classList.remove("pinned");
    tooltipEl.style.display = "none";
  }

  function clearTubeInteractionState() {
    tooltipPinned = false;
    pinnedCoord = null;
    tooltipEl.classList.remove("summary-card");
    tooltipEl.classList.remove("pinned");
    tooltipEl.style.display = "none";
  }

  function setSelectedTubeLine(lineKey, { preserveTooltip = false } = {}) {
    selectedTubeLineKey = selectedTubeLineKey === lineKey ? null : lineKey;
    if (!preserveTooltip) clearTubeInteractionState();
    deckgl.setProps({ layers: getLayers() });
    renderTubeLegend();
  }

  function stationTooltipHtml(station, pinned) {
    const enriched = true;
    const lineItems = splitStationLines(station.properties.lines, station.properties.modes);
    const lineHtml = enriched && lineItems.length
      ? `<span class="tsub">${lineItems.map((line) => line.name).join(" · ")}</span>`
      : `<span class="tsub">${station.properties.modes || "TfL"}</span>`;
    const coords = station.geometry?.coordinates;
    const boroughLabel = Array.isArray(coords) ? boroughAt(coords[0], coords[1]) : null;
    const boroughHtml = boroughLabel ? `<br><span class="tsub">Borough · ${boroughLabel}</span>` : "";
    return `${pinned ? '<span class="tclose">✕</span>' : ""}<span class="ttag">Tube</span><br><span class="tarea">${station.properties.stationName}</span><br>${lineHtml}${boroughHtml}`;
  }

  function lineTooltipHtml(line, pinned) {
    return `${pinned ? '<span class="tclose">✕</span>' : ""}<span class="ttag">Line</span><br><span class="tarea">${line.properties.lineName}</span>`;
  }

  function formatMetricValue(metricKey, value) {
    if (!Number.isFinite(value)) return "No data";
    return getMetricConfig(metricKey).formatter(value);
  }

  function boroughMetricTooltipHtml(feature, pinned) {
    const metricKey = boroughMetric;
    const metric = getMetricConfig(metricKey);
    const name = analysisFeatureName(feature);
    const value = metricValue(feature, metricKey);
    const support = [];
    if (metricKey === "density") {
      support.push(`${(feature.properties?.[activePopulationField()] ?? 0).toLocaleString()} residents`);
      support.push(`${(feature.properties?.area_km2 ?? 0).toFixed(1)} km²`);
      if (activeGeography === "msoa") {
        support.push(`Borough · ${analysisParentName(feature)}`);
      }
    } else if (metricKey === "gender_balance_pp") {
      const male = feature.properties?.male_share_pct;
      const female = feature.properties?.female_share_pct;
      if (Number.isFinite(male) && Number.isFinite(female)) support.push(`Men ${male.toFixed(1)}% · Women ${female.toFixed(1)}%`);
    } else if (metricKey === "country_of_birth_pct") {
      if (selectedCountryBirth === "ALL") {
        const notUk = feature.properties?.not_born_uk_share_pct;
        const ukBorn = Number.isFinite(notUk) ? 100 - notUk : null;
        if (Number.isFinite(ukBorn) && Number.isFinite(notUk)) support.push(`UK-born ${ukBorn.toFixed(1)}% · Not UK-born ${notUk.toFixed(1)}%`);
      } else {
        const topCountry = feature.properties?.country_birth_top_country;
        const topPct = feature.properties?.country_birth_top_country_pct;
        if (topCountry && Number.isFinite(topPct)) support.push(`Top shortlist country: ${topCountry} · ${topPct.toFixed(1)}%`);
      }
    } else if (metricKey === "children_share_pct") {
      support.push("Share of residents aged 0–15");
    } else if (metricKey === "station_access_per_10k") {
      const stationCount = feature.properties?.station_count;
      if (Number.isFinite(stationCount)) support.push(`${stationCount.toLocaleString()} mapped TfL / rail stations`);
      support.push("Station-based borough proxy derived from station locations only");
      support.push("Excludes buses, service frequency, and full PTAL");
    } else if (metricKey === "pubs_per_km2") {
      const pubCount = feature.properties?.pub_count;
      if (Number.isFinite(pubCount)) support.push(`${pubCount.toLocaleString()} mapped pubs in the OpenStreetMap snapshot`);
      support.push("OpenStreetMap amenity=pub points aggregated to borough polygons");
      support.push("Community-maintained pub location baseline, not a measure of pint price or venue quality");
    } else if (metricKey === "pubs_per_km2_msoa") {
      const pubCount = feature.properties?.pubs_count_msoa;
      if (Number.isFinite(pubCount)) support.push(`${pubCount.toLocaleString()} pubs in this MSOA`);
      support.push(`Borough · ${analysisParentName(feature)}`);
      support.push("OpenStreetMap amenity=pub points aggregated to MSOA polygons");
    } else if (metricKey === "buildings_per_km2") {
      const buildingCount = feature.properties?.building_count;
      if (Number.isFinite(buildingCount)) support.push(`${buildingCount.toLocaleString()} mapped building footprints in the OpenStreetMap snapshot`);
      support.push("OpenStreetMap building ways and relations aggregated to borough polygons");
      support.push("Community-maintained building footprint baseline, not a measure of height, floor area, or occupancy");
    } else if (metricKey === "median_age_years") {
      support.push("Census 2021 median age of usual residents");
      support.push("Derived from single-year age counts at borough level");
    } else if (metricKey === "greenspace_share_pct") {
      support.push("Share of borough area in the GLUD 2005 Greenspace class");
      support.push("Historical land-use baseline, not a current live greenspace measure");
    } else if (metricKey === "median_weekly_earnings_gbp") {
      support.push("Resident-based, full-time median pay");
    } else if (metricKey === "house_price_proxy_gbp") {
      support.push("Median sale price proxy");
    }
    const supportHtml = support.length ? `<br><span class="tsub">${support.join("<br>")}</span>` : "";
    return `${pinned ? '<span class="tclose">✕</span>' : ""}<span class="ttag">${metric.tooltipTag}</span><br><span class="tarea">${name}</span><br><span class="tval">${formatMetricValue(metricKey, value)}</span>${supportHtml}<br><span class="tsub">${metric.source} · ${metric.year}</span>`;
  }

  function densityTooltipHtml(zone, pop, dens, pinned) {
    return `${pinned ? '<span class="tclose">✕</span>' : ""}<span class="ttag">${currentDataset === "municipi" ? "Borough" : "Density"}</span><br><span class="tarea">${zone}</span><br><span class="tval">${pop.toLocaleString()}</span><span class="tsub"> residents</span><br><span class="tsub">${dens.toLocaleString()} res/km²</span>`;

  function makeComparisonSelectionLayer(feature, side) {
    if (!feature || !isAnalysisMode("compare") || !comparisonAvailable()) return null;
    const styles = side === "A"
      ? {

        }
      : {
          fill: currentTheme === "night" ? [132, 74, 92, 48] : [132, 74, 92, 32],
          line: currentTheme === "night" ? [232, 175, 193, 255] : [132, 74, 92, 255],
        };
    return new deck.GeoJsonLayer({
      id: `comparison-${side.toLowerCase()}`,
      data: { type: "FeatureCollection", features: [feature] },
      filled: true,
      stroked: true,
      pickable: false,
      getFillColor: styles.fill,
      getLineColor: styles.line,
      lineWidthUnits: "pixels",
      getLineWidth: side === "A" ? 5 : 4,
    });
  }

  function makeCorrelationSelectionLayer(feature, mode = "hover") {
    if (!feature || !isAnalysisMode("correlation") || !correlationAvailable()) return null;
    const styles = mode === "pinned"
      ? {
          fill: currentTheme === "night" ? [132, 74, 92, 44] : [132, 74, 92, 28],
          line: currentTheme === "night" ? [232, 175, 193, 255] : [132, 74, 92, 255],
          width: 4.5,
        }
      : {
          fill: currentTheme === "night" ? [17, 95, 99, 34] : [17, 95, 99, 20],
          line: currentTheme === "night" ? [126, 222, 214, 255] : [17, 95, 99, 255],
          width: 3.5,
        };
    return new deck.GeoJsonLayer({
      id: `correlation-${mode}`,
      data: { type: "FeatureCollection", features: [feature] },
      filled: true,
      stroked: true,
      pickable: false,
      getFillColor: styles.fill,
      getLineColor: styles.line,
      lineWidthUnits: "pixels",
      getLineWidth: styles.width,
    });
  }

  function makeSimilarHighlightLayer(features) {
    if (!features?.length || !isAnalysisMode("similar") || !similarityAvailable()) return null;
    return new deck.GeoJsonLayer({
      id: "similar-highlights",
      data: { type: "FeatureCollection", features },
      filled: true,
      stroked: true,
      pickable: false,
      getFillColor: currentTheme === "night" ? [154, 128, 88, 26] : [154, 128, 88, 20],
      getLineColor: currentTheme === "night" ? [232, 212, 170, 235] : [142, 109, 60, 232],
      lineWidthUnits: "pixels",
      getLineWidth: 4.5,
    });
  }

  function getLayers() {
    const layers = [];
    if (currentMainLayer) layers.push(currentMainLayer);
    const thames = makeThamesLayer();
    if (thames) layers.push(thames);
    const tubeCase = makeTubeLineCaseLayer();
    if (tubeCase) layers.push(tubeCase);
    const tubeLines = makeTubeLineLayer();
    if (tubeLines) layers.push(tubeLines);
    const stations = makeStationsLayer();
    if (stations) layers.push(stations);
    const comparisonLayerA = makeComparisonSelectionLayer(comparisonFeature(comparisonA), "A");
    if (comparisonLayerA) layers.push(comparisonLayerA);
    const comparisonLayerB = makeComparisonSelectionLayer(comparisonFeature(comparisonB), "B");
    if (comparisonLayerB) layers.push(comparisonLayerB);
    const similarLayer = makeSimilarHighlightLayer(similarHighlightFeatures());
    if (similarLayer) layers.push(similarLayer);
    const correlationPinnedLayer = makeCorrelationSelectionLayer(correlationPinnedFeature(), "pinned");
    if (correlationPinnedLayer) layers.push(correlationPinnedLayer);
    const correlationHoverLayer = makeCorrelationSelectionLayer(
      correlationHoverName && correlationPinnedFeature()?.properties?.[NAME_FIELD] !== correlationHoverName
        ? correlationFeatureByName(correlationHoverName)
        : null,
      "hover"
    );
    if (correlationHoverLayer) layers.push(correlationHoverLayer);
    const hl = makeHighlightLayer(highlightedFeature);
    if (hl) layers.push(hl);
    const pin = makePinLayer(pinData);
    if (pin) layers.push(pin);
    return layers;
  }

  function activeTubeLegendLines() {
    if (!tubeLinesGeoJSON) return [];
    const seen = new Set();
    const lines = [];
    for (const feature of tubeLinesGeoJSON.features) {
      const key = feature.properties.lineKey;
      if (!key || seen.has(key)) continue;
      seen.add(key);
      lines.push({
        key,
        name: formatLineLabel(feature.properties.lineName),
        color: currentTheme === "night" ? feature.properties.markerNight : feature.properties.markerDay,
      });
    }
    return lines.sort((a, b) => a.name.localeCompare(b.name));
  }

  function similarHighlightFeatures() {
    const feature = similarityFeature();
    if (!feature) return [];
    return similarityResultsForFeature(feature).map((entry) => entry.feature).filter(Boolean);
  }

  function normalizeAnalysisModeForState() {
    if (!analysisMode) return;
    if (analysisModeAvailable(analysisMode)) return;
    clearAnalysisModeState(analysisMode);
    analysisMode = null;
  }

  function setAnalysisMode(mode) {
    const nextMode = mode === analysisMode ? null : mode;
    const currentMode = analysisMode;

    if (nextMode && !analysisModeAvailable(nextMode)) {
      analysisMode = null;
      clearAnalysisModeState(currentMode);
      return false;
    }

    if (currentMode && currentMode !== nextMode) clearAnalysisModeState(currentMode);
    analysisMode = nextMode;

    if (analysisMode === "compare") {
      if (boroughMetric === "country_of_birth_pct") selectedCountryBirth = "ALL";
      clearPinnedTooltip();
    }

    if (analysisMode !== "correlation") correlationHoverName = null;
    if (analysisMode !== "story") activeChapterId = null;
    return true;
  }
